<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>주몽의 화살 (JUMONG'S ARROW)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  background: #10140f !important; color: #fff; font-family: 'Malgun Gothic', sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0; overflow-x: hidden;
}
.header-group { text-align: center; margin-bottom: 12px; }
h1 { margin: 0 0 4px 0; font-size: 26px; letter-spacing: 2px; color: #ffb703; text-shadow: 0 0 15px rgba(255,183,3,0.5); }
.pronunciation { font-size: 13px; color: #9aa89a; }
.sub-title { font-size: 11px; color: #7cbf6a; font-weight: bold; margin-top: 4px; }

.game-container {
  display: flex; flex-direction: row; background: #171d15; padding: 20px; border-radius: 16px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.9); border: 3px solid #3a4a30; gap: 18px; align-items: flex-start;
}
.board-wrapper { position: relative; }
#board {
  display: grid; gap: 3px; background: #0b0f09; padding: 8px; border-radius: 8px; border: 3px solid #2b3524;
}
.cell {
  width: 42px; height: 42px; background: #202a1a; border-radius: 5px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; user-select: none; transition: transform 0.15s, background 0.2s; color: #ffb703; font-weight: bold;
}
.cell.empty { background: transparent; cursor: default; }
.cell:active { transform: scale(0.92); }
.cell.flash-green { background: #2ecc71 !important; transition: none; }
.cell.flash-red { background: #e63946 !important; transition: none; }

.sidebar { width: 170px; display: flex; flex-direction: column; gap: 10px; }
.info-box { background: #0b0f09; padding: 10px; border-radius: 8px; border: 1px solid #2b3524; text-align: center; }
.info-title { font-size: 10px; color: #7cbf6a; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
.info-val { font-size: 20px; font-weight: bold; color: #ffb703; }
.hearts { font-size: 18px; letter-spacing: 3px; }
.ranking-box { background: #0b0f09; padding: 10px; border-radius: 8px; border: 1px solid #2b3524; font-size: 11px; }
.ranking-title { text-align: center; font-weight: bold; color: #ffb703; margin-bottom: 6px; }
.ranking-list { list-style: none; padding: 0; margin: 0; color: #ddd; }
.ranking-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #2b3524; padding: 3px 0; }
#start-btn { padding: 12px; background: #ffb703; color: #10140f; border: none; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 8px; width: 100%; }
#start-btn:disabled { background: #333; color: #777; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; flex-direction: column; border-radius: 8px; text-align: center; gap: 8px;
}
.overlay.show { display: flex; }
.overlay h2 { color: #ffb703; margin: 0; font-size: 18px; }
.overlay p { color: #ccc; font-size: 12px; margin: 0; }
.dev-footer { margin-top: 18px; color: #555; font-size: 10px; letter-spacing: 1px; }

@media (max-width: 768px) {
  .game-container { flex-direction: column; align-items: center; padding: 10px; }
  .sidebar { width: 90%; max-width: 300px; flex-direction: row; flex-wrap: wrap; }
  .info-box, .ranking-box { flex: 1; min-width: 80px; }
  .cell { width: 34px; height: 34px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="header-group">
  <h1>🏹 주몽의 화살 <span class="pronunciation">(JUMONG'S ARROW)</span></h1>
  <div class="sub-title">화살을 순서대로 쏘아 판을 비워라</div>
</div>

<div class="game-container">
  <div class="board-wrapper">
    <div id="board"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title"></h2>
      <p id="overlay-text"></p>
    </div>
  </div>
  <div class="sidebar">
    <div class="info-box">
      <div class="info-title">LEVEL</div>
      <div class="info-val" id="level-val">1 / 8</div>
    </div>
    <div class="info-box">
      <div class="info-title">TIME</div>
      <div class="info-val" id="time-val">00:00</div>
    </div>
    <div class="info-box">
      <div class="info-title">HEARTS</div>
      <div class="hearts" id="hearts-val">❤️❤️❤️</div>
    </div>
    <div class="ranking-box">
      <div class="ranking-title">🏆 최단시간 랭킹</div>
      <ul id="ranking-list" class="ranking-list"><li style="text-align:center;color:#888;">불러오는 중...</li></ul>
    </div>
    <button id="start-btn" onclick="startGame()">활쏘기 시작</button>
  </div>
</div>
<div class="dev-footer">JUMONG'S ARROW · Dev v1.0 · Ranking: Supabase</div>

<script>
/* ============================================================
   Supabase 설정 (테트리스와 같은 프로젝트 재사용, 테이블만 다름)
   ============================================================ */
const SUPABASE_URL = "https://pvjrbhsgffadiklpiknk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_d4NBdGqpxrg__1SXiRA-YA_TDutoT7B";
let supabaseClient = null;
try { supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.error(e); }

async function loadRanking() {
  const ul = document.getElementById('ranking-list');
  if (!supabaseClient) { ul.innerHTML = '<li style="text-align:center;color:#e63946;">⚠️ 서버 미설정</li>'; return; }
  ul.innerHTML = '<li style="text-align:center;color:#888;">불러오는 중...</li>';
  try {
    const { data, error } = await supabaseClient.from('jumong_scores').select('name, time_seconds').order('time_seconds', { ascending: true }).limit(5);
    if (error) throw error;
    if (!data || data.length === 0) { ul.innerHTML = '<li style="text-align:center;color:#888;">기록 없음</li>'; return; }
    ul.innerHTML = '';
    data.forEach((item, i) => {
      const m = Math.floor(item.time_seconds / 60), s = item.time_seconds % 60;
      ul.innerHTML += `<li class="ranking-item"><span>${i+1}. ${item.name}</span><strong>${m}:${String(s).padStart(2,'0')}</strong></li>`;
    });
  } catch(e) { console.error(e); ul.innerHTML = '<li style="text-align:center;color:#e63946;">⚠️ 불러오기 실패</li>'; }
}
async function saveScore(name, timeSeconds) {
  if (!supabaseClient) { alert("랭킹 서버가 아직 설정되지 않았습니다."); return; }
  try {
    const { error } = await supabaseClient.from('jumong_scores').insert([{ name: name.substring(0,6).toUpperCase(), time_seconds: timeSeconds }]);
    if (error) throw error;
    await loadRanking();
  } catch(e) { console.error(e); alert("점수 저장에 실패했습니다."); }
}

/* ============================================================
   게임 로직
   ============================================================ */
const LEVELS = [
  { gridSize: 4, numArrows: 5 },
  { gridSize: 4, numArrows: 7 },
  { gridSize: 5, numArrows: 9 },
  { gridSize: 5, numArrows: 12 },
  { gridSize: 6, numArrows: 15 },
  { gridSize: 6, numArrows: 18 },
  { gridSize: 7, numArrows: 22 },
  { gridSize: 7, numArrows: 26 },
];
const DIR_ARROW = { up: '↑', down: '↓', left: '←', right: '→' };
const DIR_VECTOR = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] };

let board = [];
let gridSize = 4;
let arrowsRemaining = 0;
let hearts = 3;
let currentLevelIndex = 0;
let gameActive = false;
let elapsedSeconds = 0;
let timerInterval = null;

// 반드시 풀리는 레벨 생성: 배치 순서의 "역순"이 항상 유효한 정답 경로가 됨
function generateLevel(size, numArrows) {
  const b = Array.from({length: size}, () => new Array(size).fill(null));
  const dirs = ['up','down','left','right'];
  let placed = 0, attempts = 0;
  while (placed < numArrows && attempts < numArrows * 60) {
    attempts++;
    const x = Math.floor(Math.random() * size);
    const y = Math.floor(Math.random() * size);
    if (b[y][x]) continue;
    const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
    let chosen = null;
    for (const d of shuffled) {
      const [dx, dy] = DIR_VECTOR[d];
      let cx = x + dx, cy = y + dy, clear = true;
      while (cx >= 0 && cx < size && cy >= 0 && cy < size) {
        if (b[cy][cx]) { clear = false; break; }
        cx += dx; cy += dy;
      }
      if (clear) { chosen = d; break; }
    }
    if (!chosen) continue;
    b[y][x] = { dir: chosen };
    placed++;
  }
  return { board: b, total: placed };
}

function isPathClear(x, y, dir, size, b) {
  const [dx, dy] = DIR_VECTOR[dir];
  let cx = x + dx, cy = y + dy;
  while (cx >= 0 && cx < size && cy >= 0 && cy < size) {
    if (b[cy][cx]) return false;
    cx += dx; cy += dy;
  }
  return true;
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 42px)`;
  boardEl.innerHTML = '';
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const cell = document.createElement('div');
      const data = board[y][x];
      cell.className = data ? 'cell' : 'cell empty';
      cell.dataset.x = x; cell.dataset.y = y;
      if (data) { cell.innerText = DIR_ARROW[data.dir]; cell.onclick = () => handleClick(x, y); }
      boardEl.appendChild(cell);
    }
  }
}

function handleClick(x, y) {
  if (!gameActive) return;
  const data = board[y][x];
  if (!data) return;
  const cellEl = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
  if (isPathClear(x, y, data.dir, gridSize, board)) {
    cellEl.classList.add('flash-green');
    board[y][x] = null;
    arrowsRemaining--;
    setTimeout(() => { renderBoard(); }, 150);
    if (arrowsRemaining === 0) setTimeout(levelComplete, 200);
  } else {
    cellEl.classList.add('flash-red');
    setTimeout(() => cellEl.classList.remove('flash-red'), 300);
    loseHeart();
  }
}

function loseHeart() {
  hearts--;
  document.getElementById('hearts-val').innerText = '❤️'.repeat(Math.max(hearts,0)) + '🖤'.repeat(3 - Math.max(hearts,0));
  if (hearts <= 0) retryLevel();
}

function retryLevel() {
  showOverlay('판이 막혔습니다', '같은 난이도로 다시 도전합니다', 900);
  setTimeout(() => { startLevel(currentLevelIndex, false); }, 900);
}

function showOverlay(title, text, ms) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').innerText = title;
  document.getElementById('overlay-text').innerText = text;
  ov.classList.add('show');
  if (ms) setTimeout(() => ov.classList.remove('show'), ms);
}

function startLevel(index, resetHearts = true) {
  const cfg = LEVELS[index];
  gridSize = cfg.gridSize;
  const gen = generateLevel(cfg.gridSize, cfg.numArrows);
  board = gen.board; arrowsRemaining = gen.total;
  if (resetHearts) hearts = 3;
  document.getElementById('hearts-val').innerText = '❤️❤️❤️'.slice(0, hearts*2);
  document.getElementById('level-val').innerText = `${index + 1} / ${LEVELS.length}`;
  document.getElementById('overlay').classList.remove('show');
  renderBoard();
}

function levelComplete() {
  currentLevelIndex++;
  if (currentLevelIndex < LEVELS.length) {
    showOverlay('레벨 클리어!', `다음 레벨로 이동합니다 (${currentLevelIndex + 1}/${LEVELS.length})`, 1200);
    setTimeout(() => startLevel(currentLevelIndex, true), 1200);
  } else {
    allLevelsComplete();
  }
}

function allLevelsComplete() {
  gameActive = false;
  clearInterval(timerInterval);
  showOverlay('모든 레벨 클리어! 🏹', `총 소요시간: ${formatTime(elapsedSeconds)}`, 0);
  document.getElementById('start-btn').disabled = false;
  setTimeout(() => {
    const name = prompt(`클리어 시간: ${formatTime(elapsedSeconds)}\n이름을 입력하세요:`, "AAA");
    if (name) saveScore(name, elapsedSeconds);
  }, 300);
}

function formatTime(s) { const m = Math.floor(s/60); const sec = s%60; return `${m}:${String(sec).padStart(2,'0')}`; }

function startGame() {
  document.getElementById('start-btn').disabled = true;
  currentLevelIndex = 0; elapsedSeconds = 0; gameActive = true;
  document.getElementById('time-val').innerText = '00:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    document.getElementById('time-val').innerText = formatTime(elapsedSeconds);
  }, 1000);
  startLevel(0, true);
}

loadRanking();
</script>
</body>
</html>
