    // ===== 렌더링 =====
    function drawStadium(ctx) {
        const crowdH = 200;
        const adH = 18;
        const pitchY = crowdH + adH;

        // 관중석
        ctx.fillStyle = '#1e3016'; ctx.fillRect(0, 0, WIDTH, crowdH);
        for (let i = 0; i < 650; i++) {
            let px = Math.random() * WIDTH; let py = Math.random() * crowdH;
            let colors = ['#7a1f1f', '#932020', '#c0392b', '#4d1414', '#5a1a1a', '#3a1010'];
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.fillRect(px, py, 2, 2);
        }
        const shade = ctx.createLinearGradient(0, crowdH - 45, 0, crowdH);
        shade.addColorStop(0, 'rgba(0,0,0,0)'); shade.addColorStop(1, 'rgba(0,0,0,0.5)');
        ctx.fillStyle = shade; ctx.fillRect(0, crowdH - 45, WIDTH, 45);

        // 광고판 펜스
        const adColors = ['#e74c3c', '#2980b9', '#f1c40f', '#27ae60', '#8e44ad', '#e67e22'];
        const segW = WIDTH / adColors.length;
        for (let i = 0; i < adColors.length; i++) {
            ctx.fillStyle = adColors[i];
            ctx.fillRect(i * segW, crowdH, segW, adH);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillRect(i * segW + segW * 0.28, crowdH + adH * 0.32, segW * 0.44, adH * 0.36);
        }
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, crowdH, WIDTH, 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, crowdH + adH - 2, WIDTH, 2);

        // 잔디 경계선
        ctx.fillStyle = '#27ae60'; ctx.fillRect(0, pitchY, WIDTH, 8);
        ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(0, pitchY + 8, WIDTH, 2);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(0, pitchY + 10, WIDTH, HEIGHT - (pitchY + 10));

        const vanishY = pitchY + 10;
        ctx.fillStyle = '#27ae60';
        for (let i = -6; i <= 6; i += 2) {
            ctx.beginPath(); ctx.moveTo(WIDTH/2 + i*30, vanishY); ctx.lineTo(WIDTH/2 + (i+1)*30, vanishY);
            ctx.lineTo(WIDTH/2 + (i+1)*180, HEIGHT); ctx.lineTo(WIDTH/2 + i*180, HEIGHT); ctx.fill();
        }

        // 골라인 (실제 축구장처럼 터치라인까지 화면 전체 너비로 연장)
        const goalLineY = goal.y + goal.height + 15;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(0, goalLineY - 2, WIDTH, 4);

        // 페널티 박스 (키커와 골키퍼 사이 가로선)
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(0, 480, WIDTH, 5);

        // PK 스팟 (승부차기 지점 표시) - 실제 페널티 스팟처럼 작은 점으로, 공이 그 위에 있을 땐 가려지는 게 자연스럽다
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath(); ctx.arc(ballStart.x, ballStart.y, 3.5, 0, Math.PI * 2); ctx.fill();
    }

    function drawGoal(ctx) {
        const inset = 7;

        // 그물 지붕(윗면) - 크로스바보다 살짝 뒤로 들어간 느낌
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        ctx.beginPath();
        ctx.moveTo(goal.x - 8, goal.y - 8);
        ctx.lineTo(goal.x + goal.width + 8, goal.y - 8);
        ctx.lineTo(goal.x + goal.width - inset, goal.y - 8 - 16);
        ctx.lineTo(goal.x + inset, goal.y - 8 - 16);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
        for (let i = 0; i <= 8; i++) {
            const t = i / 8;
            ctx.beginPath();
            ctx.moveTo(goal.x - 8 + t * (goal.width + 16), goal.y - 8);
            ctx.lineTo(goal.x + inset + t * (goal.width + 16 - inset * 2), goal.y - 24);
            ctx.stroke();
        }

        // 그물 측면(좌/우) - 포스트보다 살짝 뒤로 들어간 느낌
        ctx.fillStyle = 'rgba(255,255,255,0.13)';
        ctx.beginPath();
        ctx.moveTo(goal.x - 8, goal.y - 8);
        ctx.lineTo(goal.x - 8, goal.y + goal.height + 7);
        ctx.lineTo(goal.x + inset, goal.y + goal.height - 6);
        ctx.lineTo(goal.x + inset, goal.y - 24);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(goal.x + goal.width + 8, goal.y - 8);
        ctx.lineTo(goal.x + goal.width + 8, goal.y + goal.height + 7);
        ctx.lineTo(goal.x + goal.width - inset, goal.y + goal.height - 6);
        ctx.lineTo(goal.x + goal.width - inset, goal.y - 24);
        ctx.closePath(); ctx.fill();

        // 그물(정면, 안쪽으로 살짝 인셋)
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        for (let x = goal.x + inset; x <= goal.x + goal.width - inset; x += 12) {
            ctx.fillRect(x, goal.y - 2, 2, goal.height + 2);
        }
        for (let y = goal.y - 2; y <= goal.y + goal.height; y += 12) {
            ctx.fillRect(goal.x + inset, y, goal.width - inset * 2, 2);
        }

        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(goal.x - 8, goal.y - 8, goal.width + 16, 8);
        ctx.fillRect(goal.x - 8, goal.y, 8, goal.height + 15);
        ctx.fillRect(goal.x + goal.width, goal.y, 8, goal.height + 15);
    }

    function drawJoint(ctx, x, y) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
    }

    // 옅고 부드럽게 퍼지는 그림자 (경계가 뚜렷한 단색 타원 대신 가장자리가 자연스럽게 사라짐)
    function drawGroundShadow(ctx, cx, cy, rx, ry, maxAlpha) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(rx, ry);
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
        grad.addColorStop(0, `rgba(0,0,0,${maxAlpha})`);
        grad.addColorStop(0.7, `rgba(0,0,0,${maxAlpha * 0.55})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawFlagIcon(ctx, kit, x, y, w, h) {
        if (!kit) return;
        ctx.save();
        ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
        switch (kit.name) {
            case '스페인':
                ctx.fillStyle = '#c60b1e'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#ffc400'; ctx.fillRect(x, y + h * 0.25, w, h * 0.5);
                break;
            case '프랑스':
                ctx.fillStyle = '#0055a4'; ctx.fillRect(x, y, w / 3, h);
                ctx.fillStyle = '#fff'; ctx.fillRect(x + w / 3, y, w / 3, h);
                ctx.fillStyle = '#ef4135'; ctx.fillRect(x + w * 2 / 3, y, w / 3, h);
                break;
            case '잉글랜드':
                ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#ce1124';
                ctx.fillRect(x, y + h * 0.375, w, h * 0.25);
                ctx.fillRect(x + w * 0.42, y, w * 0.16, h);
                break;
            case '아르헨티나':
                ctx.fillStyle = '#75aadb'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#fff'; ctx.fillRect(x, y + h / 3, w, h / 3);
                ctx.fillStyle = '#f6b40e';
                ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, h * 0.16, 0, Math.PI * 2); ctx.fill();
                break;
            case '한국': {
                ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h);
                const ksx = w / 24, ksy = h / 16;
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(ksx, ksy);

                ctx.save();
                ctx.translate(12, 8); ctx.rotate(30 * Math.PI / 180); ctx.scale(-1, 1); ctx.translate(-12, -8);
                ctx.fillStyle = '#003478';
                ctx.beginPath(); ctx.arc(12, 8, 4.4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#cd2e3a';
                ctx.fill(new Path2D('M7.6,8 A4.4,4.4 0 0 1 16.4,8 A2.2,2.2 0 0 1 12,8 A2.2,2.2 0 0 0 7.6,8 Z'));
                ctx.restore();

                ctx.fillStyle = '#111';
                const drawTrigramBar = (solid) => {
                    if (solid) { ctx.fillRect(-1.8, -0.325, 3.6, 0.65); }
                    else { ctx.fillRect(-1.8, -0.325, 1.45, 0.65); ctx.fillRect(0.35, -0.325, 1.45, 0.65); }
                };
                const drawTrigram = (cx, cy, angle, pattern) => {
                    ctx.save();
                    ctx.translate(cx, cy); ctx.rotate(angle * Math.PI / 180);
                    ctx.save(); ctx.translate(0, -1.15); drawTrigramBar(pattern[0]); ctx.restore();
                    ctx.save(); drawTrigramBar(pattern[1]); ctx.restore();
                    ctx.save(); ctx.translate(0, 1.15); drawTrigramBar(pattern[2]); ctx.restore();
                    ctx.restore();
                };
                drawTrigram(4.6, 3.8, 135, [true, true, true]);      // 건(乾)
                drawTrigram(19.4, 3.8, 45, [false, true, false]);    // 감(坎)
                drawTrigram(4.6, 12.2, 225, [true, false, true]);    // 리(離)
                drawTrigram(19.4, 12.2, 315, [false, false, false]); // 곤(坤)
                ctx.restore();
                break;
            }
            case '일본':
                ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#bc002d';
                ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, h * 0.32, 0, Math.PI * 2); ctx.fill();
                break;
            case '브라질':
                ctx.fillStyle = '#009c3b'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#ffdf00';
                ctx.beginPath();
                ctx.moveTo(x + w / 2, y + h * 0.12); ctx.lineTo(x + w * 0.88, y + h / 2);
                ctx.lineTo(x + w / 2, y + h * 0.88); ctx.lineTo(x + w * 0.12, y + h / 2);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#002776';
                ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, h * 0.2, 0, Math.PI * 2); ctx.fill();
                break;
            case '포르투갈':
                ctx.fillStyle = '#046a38'; ctx.fillRect(x, y, w * 0.4, h);
                ctx.fillStyle = '#da020e'; ctx.fillRect(x + w * 0.4, y, w * 0.6, h);
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath(); ctx.arc(x + w * 0.4, y + h / 2, h * 0.17, 0, Math.PI * 2); ctx.fill();
                break;
            case '모로코': {
                ctx.fillStyle = '#c1272d'; ctx.fillRect(x, y, w, h);
                const msx = w / 24, msy = h / 16;
                ctx.save();
                ctx.translate(x, y); ctx.scale(msx, msy);
                ctx.fillStyle = '#006233';
                ctx.beginPath();
                ctx.moveTo(12, 4.6); ctx.lineTo(14, 10.75); ctx.lineTo(8.77, 6.95);
                ctx.lineTo(15.23, 6.95); ctx.lineTo(10, 10.75); ctx.closePath();
                ctx.fill();
                ctx.restore();
                break;
            }
            default:
                ctx.fillStyle = '#999'; ctx.fillRect(x, y, w, h);
        }
        ctx.restore();
        ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
    }

    function drawKeeper(ctx) {
        const isDiving = keeper.state === 'DIVING';
        const isReady = keeper.state === 'READY';

        // 현재 라운드의 수비 측(공격자의 반대편)에 따라 골키퍼 색을 구분
        // side 1 (나 / P1) = 노란색, side 2 (상대 / AI / P2) = 분홍색
        const defenderSide = currentKicker === 1 ? 2 : 1;
        const kColor = defenderSide === 1 ? '#f1c40f' : '#e84393';
        const kColorDark = defenderSide === 1 ? '#c9960a' : '#c93074';

        if (isDiving) {
            keeper.diveElapsed = (keeper.diveElapsed || 0) + 1;
        } else {
            keeper.diveElapsed = 0;
        }

        ctx.save(); ctx.translate(keeper.x, keeper.y);

        // 원근감 보정: 골대 안쪽의 골키퍼는 키커보다 카메라에서 멀어 보이지만,
        // 기존 크기가 너무 작았으므로 발(그림자) 위치를 고정한 채 확대한다.
        const KSCALE = 1.75;
        const KFOOT_Y = 5;
        ctx.scale(KSCALE, KSCALE);
        ctx.translate(0, KFOOT_Y * (1 / KSCALE - 1));

        if (isDiving) {
            const dir = keeper.diveDir || 1;
            const flightFrames = 24;
            const inFlight = keeper.diveElapsed <= flightFrames;

            drawGroundShadow(ctx, 0, 6, 16, 4.5, 0.3);

            if (inFlight) {
                const t = keeper.diveElapsed / flightFrames;
                const elevation = -Math.sin(t * Math.PI) * 34;
                const lean = dir * Math.min(1, t * 1.5) * 1.05;
                ctx.translate(0, elevation);
                ctx.rotate(lean);

                // 접힌 다리 (허벅지+종아리+무릎)
                ctx.fillStyle = kColorDark;
                ctx.fillRect(-6 - dir * 8, 2, 7, 9);
                ctx.fillRect(-8 - dir * 15, 9, 7, 9);
                drawJoint(ctx, -3 - dir * 8, 11);
                // 뻗은 다리 (허벅지+종아리+무릎)
                ctx.fillRect(1 - dir * 2, 3, 7, 8);
                ctx.fillRect(4 - dir * 11, 9, 7, 10);
                drawJoint(ctx, 4 - dir * 2, 11);
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.ellipse(-5 - dir * 15, 18, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(7 - dir * 11, 19, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

                // 몸통 (뻗은 자세)
                ctx.fillStyle = kColor;
                ctx.beginPath();
                ctx.moveTo(-11, -18); ctx.lineTo(11, -18); ctx.lineTo(9, 4); ctx.lineTo(-9, 4); ctx.fill();

                // 뻗은 팔 (상완 + 팔꿈치 + 하완), 반대팔은 접어서 몸에 붙임
                ctx.fillStyle = kColor;
                ctx.save();
                ctx.translate(dir * 9, -16); ctx.rotate(dir * 0.3);
                ctx.fillRect(0, -3, dir * 13, 7);
                ctx.save(); ctx.translate(dir * 13, 0); ctx.rotate(dir * 0.15);
                ctx.fillRect(0, -3, dir * 13, 7);
                ctx.restore();
                ctx.restore();
                drawJoint(ctx, dir * 22, -16);
                ctx.fillRect(-dir * 9 - 6, -16, 12, 8);
                drawJoint(ctx, -dir * 9, -12);

                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(dir * 33, -16 - dir * 3, 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(-dir * 12, -12, 5, 0, Math.PI * 2); ctx.fill();

                // 머리
                ctx.fillStyle = '#ffccaa';
                ctx.beginPath(); ctx.arc(dir * 3, -24, 7, 0, Math.PI * 2); ctx.fill();
            } else {
                // 착지 후 잔디 위에 대(大)자로 뻗은 모습
                ctx.rotate(dir * 1.4);
                ctx.fillStyle = kColor;
                ctx.beginPath(); ctx.ellipse(0, -6, 13, 7, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = kColorDark;
                ctx.fillRect(-20, -9, 14, 6); ctx.fillRect(6, -9, 14, 6);
                ctx.fillRect(-9, -2, 7, 14); ctx.fillRect(2, -2, 7, 14);
                drawJoint(ctx, -7, -6); drawJoint(ctx, 7, -6);
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-20, -6, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(20, -6, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-5.5, 13, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(8.5, 13, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffccaa';
                ctx.beginPath(); ctx.arc(-dir * 13, -9, 6.5, 0, Math.PI * 2); ctx.fill();
            }
        } else {
            const shift = Math.sin(gameFrame * 0.09) * (isReady ? 5.5 : 3);
            const armWave = Math.sin(gameFrame * 0.17) * 8;
            const crouch = isReady ? 3 : 0;

            drawGroundShadow(ctx, shift * 0.3, 5, 15, 5, 0.32);

            ctx.translate(shift * 0.35, crouch);

            // 다리 (허벅지 + 무릎 관절 + 종아리)
            ctx.fillStyle = kColorDark;
            ctx.fillRect(-9 + shift * 0.4, -6, 7, 9 - crouch * 0.4);
            ctx.fillRect(-9 + shift * 0.4, 3 - crouch * 0.4, 7, 8 - crouch * 0.4);
            ctx.fillRect(2 + shift * 0.4, -6, 7, 9 - crouch * 0.4);
            ctx.fillRect(2 + shift * 0.4, 3 - crouch * 0.4, 7, 8 - crouch * 0.4);
            drawJoint(ctx, -5.5 + shift * 0.4, 3 - crouch * 0.4);
            drawJoint(ctx, 5.5 + shift * 0.4, 3 - crouch * 0.4);
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.ellipse(-5.5 + shift * 0.4, 11 - crouch, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(8.5 + shift * 0.4, 11 - crouch, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

            // 반바지
            ctx.fillStyle = '#222'; ctx.fillRect(-8, -10, 16, 8 + crouch * 0.6);

            // 몸통
            ctx.fillStyle = kColor;
            ctx.beginPath();
            ctx.moveTo(-10, -30); ctx.lineTo(10, -30); ctx.lineTo(8, -10); ctx.lineTo(-8, -10); ctx.fill();

            // 팔 (상완 + 팔꿈치 관절 + 하완, 좌우로 흔들기)
            ctx.fillStyle = kColor;
            ctx.save(); ctx.translate(-13, -27); ctx.rotate((-14 + armWave) * Math.PI / 180); ctx.fillRect(-3, 0, 6, 9); ctx.restore();
            ctx.save(); ctx.translate(-13, -27 + 8); ctx.rotate((-8 + armWave * 1.4) * Math.PI / 180); ctx.fillRect(-3, 0, 6, 9); ctx.restore();
            ctx.save(); ctx.translate(13, -27); ctx.rotate((14 - armWave) * Math.PI / 180); ctx.fillRect(-3, 0, 6, 9); ctx.restore();
            ctx.save(); ctx.translate(13, -27 + 8); ctx.rotate((8 - armWave * 1.4) * Math.PI / 180); ctx.fillRect(-3, 0, 6, 9); ctx.restore();
            drawJoint(ctx, -13, -19); drawJoint(ctx, 13, -19);

            const handOff = Math.sin(armWave * Math.PI / 180) * 5;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-14 - handOff, -9, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(14 + handOff, -9, 5, 0, Math.PI * 2); ctx.fill();

            // 머리
            ctx.fillStyle = '#ffccaa';
            ctx.beginPath(); ctx.arc(0, -38, 7, 0, Math.PI * 2); ctx.fill();

            drawJoint(ctx, -5 + shift * 0.4, 1 - crouch);
            drawJoint(ctx, 5 + shift * 0.4, 1 - crouch);
        }

        ctx.restore();
    }


    function drawPlayer(ctx) {
        const baseKit = currentKit();
        const isGkKicker = roundShirtNumber === 1;
        const kit = isGkKicker ? gkVariant(baseKit) : baseKit;
        ctx.save(); ctx.translate(player.x, player.y);
        if (tellActive) { ctx.rotate(tellDir * tellAngle); }

        // 원근감 보정: 카메라와 가장 가까운 키커는 골키퍼보다 훨씬 크게 보여야 자연스럽다.
        // 발(그림자) 위치는 고정한 채로 몸 전체만 확대한다.
        const PSCALE = 2.2;
        const PFOOT_Y = 15;
        ctx.scale(PSCALE, PSCALE);
        ctx.translate(0, PFOOT_Y * (1 / PSCALE - 1));

        let bob = player.state === 'RUNNING' ? Math.sin(gameFrame * 0.6) * 4 : 0;

        drawGroundShadow(ctx, 0, 15, 16, 4, 0.32);

        ctx.fillStyle = kit.shorts; ctx.fillRect(-9, -10 + bob, 18, 12);
        if (kit.shortsAccent) { ctx.fillStyle = kit.shortsAccent; ctx.fillRect(-9, -10 + bob, 18, 2); }

        ctx.fillStyle = kit.sock;
        if (player.state === 'IDLE' || Math.floor(gameFrame / 5) % 2 === 0) {
            ctx.fillRect(-8, 2 + bob, 6, 7); ctx.fillRect(2, 2 + bob, 6, 7);
            drawJoint(ctx, -5, 9 + bob); drawJoint(ctx, 5, 9 + bob);
            ctx.fillRect(-8, 9 + bob, 6, 5); ctx.fillRect(2, 9 + bob, 6, 5);
            drawJoint(ctx, -5, 8 + bob); drawJoint(ctx, 5, 8 + bob);
            if (kit.sockStripe) {
                ctx.fillStyle = kit.sockStripe;
                ctx.fillRect(-8, 2 + bob, 6, 2); ctx.fillRect(2, 2 + bob, 6, 2);
            }
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.ellipse(-5, 15 + bob, 5, 3, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(5, 15 + bob, 5, 3, 0, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillRect(-8, -2 + bob, 6, 8); ctx.fillRect(2, 6 + bob, 6, 5);
            drawJoint(ctx, -5, 6 + bob); drawJoint(ctx, 5, 11 + bob);
            ctx.fillRect(-8, 6 + bob, 6, 8); ctx.fillRect(2, 11 + bob, 6, 3);
            drawJoint(ctx, -5, 5 + bob); drawJoint(ctx, 5, 10 + bob);
            if (kit.sockStripe) {
                ctx.fillStyle = kit.sockStripe;
                ctx.fillRect(-8, -2 + bob, 6, 2); ctx.fillRect(2, 6 + bob, 6, 2);
            }
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.ellipse(-5, 12 + bob, 5, 3, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(5, 16 + bob, 5, 3, 0, 0, Math.PI*2); ctx.fill();
        }

        ctx.fillStyle = kit.shirt;
        ctx.beginPath();
        ctx.moveTo(-13, -38 + bob); ctx.lineTo(13, -38 + bob);
        ctx.lineTo(10, -10 + bob); ctx.lineTo(-10, -10 + bob); ctx.closePath(); ctx.fill();

        if (kit.pattern === 'diagonal' && kit.shirt2) {
            // 대각선 배색 (포르투갈 스타일)
            ctx.fillStyle = kit.shirt2;
            ctx.beginPath();
            ctx.moveTo(13, -38 + bob); ctx.lineTo(10, -10 + bob); ctx.lineTo(-10, -10 + bob); ctx.closePath(); ctx.fill();
        } else if (kit.pattern === 'stripe' && kit.shirt2) {
            ctx.fillStyle = kit.shirt2;
            for (let sx = -12; sx < 12; sx += 6) {
                ctx.fillRect(sx, -38 + bob, 3, 28);
            }
        } else if (kit.pattern === 'sleeve' && kit.shirt2) {
            // 래글런 소매 배색 (스페인/잉글랜드/브라질/모로코 스타일)
            ctx.fillStyle = kit.shirt2;
            ctx.beginPath();
            ctx.moveTo(-13, -38 + bob); ctx.lineTo(-3, -38 + bob); ctx.lineTo(-6, -30 + bob); ctx.lineTo(-13, -32 + bob); ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(13, -38 + bob); ctx.lineTo(3, -38 + bob); ctx.lineTo(6, -30 + bob); ctx.lineTo(13, -32 + bob); ctx.closePath(); ctx.fill();
        } else if (kit.pattern === 'tiger' && kit.shirt2) {
            // 호랑이 줄무늬 (한국 스타일) - 비정형 대각선 스트라이프
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(-13, -38 + bob); ctx.lineTo(13, -38 + bob);
            ctx.lineTo(10, -10 + bob); ctx.lineTo(-10, -10 + bob); ctx.closePath(); ctx.clip();
            ctx.fillStyle = kit.shirt2; ctx.globalAlpha = 0.75;
            const streaks = [
                { x: -15, y: -36 + bob, w: 12, h: 3, rot: -0.32 },
                { x: -7, y: -30 + bob, w: 16, h: 2.6, rot: 0.28 },
                { x: 1, y: -24 + bob, w: 14, h: 3, rot: -0.22 },
                { x: -12, y: -18 + bob, w: 18, h: 2.8, rot: 0.32 },
                { x: -3, y: -13 + bob, w: 12, h: 2.6, rot: -0.26 }
            ];
            streaks.forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
                ctx.fillRect(0, 0, s.w, s.h);
                ctx.restore();
            });
            ctx.globalAlpha = 1;
            ctx.restore();

            // 어깨 부분 호랑이 무늬 (좌우 소매 상단에도 확실히 보이도록 추가)
            ctx.save();
            ctx.fillStyle = kit.shirt2; ctx.globalAlpha = 0.8;
            [-1, 1].forEach(dir => {
                ctx.save();
                ctx.translate(dir * 10, -36 + bob); ctx.rotate(dir * 0.5);
                ctx.fillRect(-3, 0, 6, 3);
                ctx.fillRect(-3, 5, 6, 2.4);
                ctx.restore();
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        if (kit.collar) {
            ctx.fillStyle = kit.collar;
            ctx.beginPath();
            ctx.moveTo(-5, -38 + bob); ctx.lineTo(5, -38 + bob);
            ctx.lineTo(3, -34 + bob); ctx.lineTo(0, -31 + bob); ctx.lineTo(-3, -34 + bob);
            ctx.closePath(); ctx.fill();
        }

        ctx.fillStyle = '#fff';
        ctx.font = roundShirtNumber >= 10 ? 'bold 12px "Courier New"' : 'bold 16px "Courier New"';
        ctx.textAlign = 'center'; ctx.fillText(String(roundShirtNumber), 0, -28 + bob);

        ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(0, -46 + bob, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(0, -50 + bob, 6, 0, Math.PI * 2); ctx.fill();

        // 팔 (상완 + 팔꿈치 관절 + 하완)
        const armColor = (kit.pattern === 'sleeve' && kit.shirt2) ? kit.shirt2 : kit.shirt;
        ctx.fillStyle = armColor;
        ctx.fillRect(-17, -38 + bob, 5, 9); ctx.fillRect(12, -38 + bob, 5, 9);
        drawJoint(ctx, -14.5, -29 + bob); drawJoint(ctx, 14.5, -29 + bob);
        ctx.fillRect(-17, -29 + bob, 5, 8); ctx.fillRect(12, -29 + bob, 5, 8);
        drawJoint(ctx, -14.5, -28 + bob); drawJoint(ctx, 14.5, -28 + bob);
        ctx.fillStyle = '#ffccaa';
        ctx.beginPath(); ctx.arc(-14.5, -20 + bob, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(14.5, -20 + bob, 3, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }

    function drawBall(ctx) {
        ctx.save();
        let hFactor = (ballStart.y - ball.y) / (ballStart.y - goal.y);

        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(ball.x, ball.y + hFactor*25 + 10, ball.radius, ball.radius*0.4, 0, 0, Math.PI * 2); ctx.fill();

        ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);

        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-ball.radius*0.5, -ball.radius*0.5); ctx.lineTo(0, -ball.radius*0.8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ball.radius*0.7, 0); ctx.lineTo(ball.radius*0.5, ball.radius*0.5); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-ball.radius*0.6, ball.radius*0.4); ctx.lineTo(-ball.radius*0.2, ball.radius*0.7); ctx.fill();

        ctx.restore();
    }

    function drawTargetCursor(ctx) {
        if (gameState !== 'AIM_Y' && gameState !== 'AIM_X') return;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2;
        if (gameState === 'AIM_Y') {
            ctx.beginPath(); ctx.moveTo(0, targetCursor.y); ctx.lineTo(WIDTH, targetCursor.y); ctx.stroke();
        } else {
            ctx.beginPath(); ctx.moveTo(targetCursor.x, goal.y - 20); ctx.lineTo(targetCursor.x, goal.y + goal.height + 20); ctx.stroke();
        }

        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(targetCursor.x, targetCursor.y, targetCursor.radius, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(targetCursor.x - 22, targetCursor.y); ctx.lineTo(targetCursor.x + 22, targetCursor.y);
        ctx.moveTo(targetCursor.x, targetCursor.y - 22); ctx.lineTo(targetCursor.x, targetCursor.y + 22);
        ctx.stroke();

        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(targetCursor.x, targetCursor.y, 3, 0, Math.PI * 2); ctx.fill();
    }

    function drawPowerBar(ctx) {
        if (gameState !== 'POWER_RUN' && gameState !== 'KICKED' && gameState !== 'DEFEND_PICK' && gameState !== 'RESULT') return;

        const barW = 280; const barH = 26;
        const barX = WIDTH/2 - barW/2; const barY = 560;

        ctx.fillStyle = '#f1c40f'; ctx.fillRect(barX, barY, barW * 0.4, barH);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(barX + barW * 0.4, barY, barW * 0.45, barH);
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(barX + barW * 0.85, barY, barW * 0.15, barH);

        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);

        let cursorX = barX + (powerBar.value / 100) * barW;
        ctx.fillStyle = '#fff'; ctx.fillRect(cursorX - 4, barY - 6, 8, barH + 12);
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(cursorX - 4, barY - 6, 8, barH + 12);

        if (gameState === 'POWER_RUN' && !powerBar.locked) {
            ctx.textAlign = 'center';
            if (Math.floor(gameFrame / 8) % 2 === 0) {
                ctx.font = 'bold 17px "Courier New"';
                ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
                ctx.strokeText('초록 구간에서 지금 탭!', WIDTH/2, barY - 16);
                ctx.fillText('초록 구간에서 지금 탭!', WIDTH/2, barY - 16);
            }

            const elapsed = gameFrame - powerBar.startFrame;
            const remainSec = Math.max(0, Math.ceil((powerBar.timeLimit - elapsed) / 60));
            ctx.font = 'bold 28px "Courier New"'; ctx.textAlign = 'center';
            ctx.fillStyle = remainSec <= 2 ? '#e74c3c' : '#fff';
            ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
            ctx.strokeText(String(remainSec), barX - 22, barY + barH / 2 + 9);
            ctx.fillText(String(remainSec), barX - 22, barY + barH / 2 + 9);

            // 심장박동(BPM) 연출 - 게이지 속도가 빠를수록 박동이 빨라짐
            const bpm = Math.round(60 + powerBar.speed * 18);
            const beatPulse = 1 + Math.abs(Math.sin(gameFrame * (0.1 + powerBar.speed * 0.012))) * 0.35;
            ctx.save();
            ctx.translate(barX - 22, barY + barH / 2 + 30);
            ctx.scale(beatPulse, beatPulse);
            ctx.font = 'bold 13px "Courier New"'; ctx.textAlign = 'center';
            ctx.fillStyle = '#ff4d6d'; ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
            ctx.strokeText('♥', 0, 0);
            ctx.fillText('♥', 0, 0);
            ctx.restore();
            ctx.font = 'bold 8px "Courier New"'; ctx.textAlign = 'center';
            ctx.fillStyle = '#ffd1d1';
            ctx.fillText(`${bpm}`, barX - 22, barY + barH / 2 + 44);
        } else if (powerBar.locked && powerBar.power) {
            ctx.font = 'bold 24px "Courier New"'; ctx.textAlign = 'center';
            let color = powerBar.power === 'PERFECT' ? '#2ecc71' : (powerBar.power === 'WEAK' ? '#f1c40f' : '#e74c3c');
            ctx.fillStyle = color; ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
            ctx.strokeText(powerBar.power, WIDTH/2, barY - 18);
            ctx.fillText(powerBar.power, WIDTH/2, barY - 18);
        }
    }

    function drawScoreboardUI(ctx) {
        const n = maxAttempts;
        const dotSpacing = Math.min(19, 112 / n);
        const boardW = Math.max(215, 92 + n * dotSpacing);
        const boardH = 92; const boardX = WIDTH / 2 - boardW / 2; const boardY = 14;

        // 바깥 베젤 (금속 프레임 느낌)
        const bezelGrad = ctx.createLinearGradient(boardX - 5, boardY - 5, boardX - 5, boardY + boardH + 5);
        bezelGrad.addColorStop(0, '#3a3a3a'); bezelGrad.addColorStop(1, '#111');
        ctx.fillStyle = bezelGrad;
        ctx.beginPath(); ctx.roundRect(boardX - 5, boardY - 5, boardW + 10, boardH + 10, 9); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(boardX - 5, boardY - 5, boardW + 10, boardH + 10, 9); ctx.stroke();

        // 모서리 볼트
        ctx.fillStyle = '#666';
        [[boardX - 1, boardY - 1], [boardX + boardW + 1, boardY - 1], [boardX - 1, boardY + boardH + 1], [boardX + boardW + 1, boardY + boardH + 1]].forEach(([bx, by]) => {
            ctx.beginPath(); ctx.arc(bx, by, 2.4, 0, Math.PI * 2); ctx.fill();
        });

        // 내부 스크린 (LED 패널)
        const screenGrad = ctx.createLinearGradient(boardX, boardY, boardX, boardY + boardH);
        screenGrad.addColorStop(0, '#062012'); screenGrad.addColorStop(1, '#01100a');
        ctx.fillStyle = screenGrad;
        ctx.beginPath(); ctx.roundRect(boardX, boardY, boardW, boardH, 4); ctx.fill();
        ctx.strokeStyle = '#0f5c33'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(boardX, boardY, boardW, boardH, 4); ctx.stroke();

        // 중앙 구분선
        ctx.strokeStyle = 'rgba(46,204,113,0.25)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(boardX + 6, boardY + boardH / 2); ctx.lineTo(boardX + boardW - 6, boardY + boardH / 2); ctx.stroke();

        const kitA = p1Kit;
        const kitB = gameMode === '1P' ? opponentKit : p2Kit;
        const rowH = boardH / 2;
        const row1Y = boardY + rowH / 2;
        const row2Y = boardY + rowH + rowH / 2;

        // 국기 + 코드
        drawFlagIcon(ctx, kitA, boardX + 8, row1Y - 7, 20, 14);
        drawFlagIcon(ctx, kitB, boardX + 8, row2Y - 7, 20, 14);

        ctx.textAlign = 'left'; ctx.font = 'bold 9px "Courier New"';
        ctx.fillStyle = '#8fffb0'; ctx.shadowColor = '#2ecc71'; ctx.shadowBlur = 3;
        ctx.fillText(kitA ? kitA.code : 'P1', boardX + 32, row1Y + 3);
        ctx.fillText(kitB ? kitB.code : 'P2', boardX + 32, row2Y + 3);
        ctx.shadowBlur = 0;

        // 슈팅 LED 표시등
        for (let i = 0; i < n; i++) {
            let cx = boardX + 62 + i * dotSpacing;
            drawLed(ctx, cx, row1Y, shotResults1[i]);
            drawLed(ctx, cx, row2Y, shotResults2[i]);
        }

        // 디지털 스코어
        ctx.textAlign = 'right'; ctx.font = 'bold 22px "Courier New"';
        ctx.fillStyle = '#ffcc00'; ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 7;
        ctx.fillText(`${score1}-${score2}`, boardX + boardW - 8, boardY + boardH / 2 + 8);
        ctx.shadowBlur = 0;
    }

    function drawLed(ctx, cx, cy, result) {
        let color = '#173d26';
        let glow = 0;
        if (result === 'GOAL') { color = '#2ecc71'; glow = 6; }
        else if (result === 'SAVED' || result === 'MISS') { color = '#e74c3c'; glow = 6; }
        ctx.save();
        ctx.shadowColor = color; ctx.shadowBlur = glow;
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(cx, cy, 3.4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }


    // ===== 메인 루프 =====
    function gameLoop() {
        gameFrame++;

        if (gameState !== 'START_SCREEN') {

            if (gameState === 'AIM_Y') {
                targetCursor.y += targetCursor.speed * targetCursor.dirY;
                if (targetCursor.y > goal.y + goal.height - 10 || targetCursor.y < goal.y + 10) targetCursor.dirY *= -1;
            } else if (gameState === 'AIM_X') {
                targetCursor.x += targetCursor.speed * targetCursor.dirX;
                if (targetCursor.x > goal.x + goal.width - 15 || targetCursor.x < goal.x + 15) targetCursor.dirX *= -1;
            }

            if (gameState === 'POWER_RUN') {
                if (!powerBar.locked) {
                    powerBar.value += powerBar.speed * powerBar.dir;
                    if (powerBar.value > 100 || powerBar.value < 0) powerBar.dir *= -1;

                    const elapsed = gameFrame - powerBar.startFrame;
                    const remainSec = Math.max(0, Math.ceil((powerBar.timeLimit - elapsed) / 60));
                    if (remainSec <= 3 && remainSec !== lastBeepSecond) {
                        lastBeepSecond = remainSec;
                        if (remainSec > 0) sfxCountBeep(remainSec <= 1);
                    }
                    if (elapsed >= powerBar.timeLimit) {
                        powerBar.locked = true;
                        if (powerBar.value < 40) powerBar.power = 'WEAK';
                        else if (powerBar.value < 85) powerBar.power = 'PERFECT';
                        else powerBar.power = 'OVERPOWER';
                    }
                }

                if (Math.hypot(player.x - (ballStart.x - 12), player.y - (ballStart.y + 5)) > 5) {
                    player.x += (ballStart.x - player.x - 12) * 0.045;
                    player.y += (ballStart.y - player.y + 5) * 0.045;
                }

                if (powerBar.locked) {
                    gameState = 'KICKED';
                    evaluateShot();
                }
            }

            if (gameState === 'OPP_PREP') {
                player.state = 'RUNNING';
                player.x += (ballStart.x - player.x - 12) * 0.045;
                player.y += (ballStart.y - player.y + 5) * 0.045;
                opponentPrepTimer--;

                if (tellDir !== 0) {
                    tellActive = (opponentPrepTimer <= tellWindowStart && opponentPrepTimer > tellWindowStart - tellDuration);
                }

                if (!opponentKickTriggered && (opponentPrepTimer <= 0 || Math.hypot(player.x - (ballStart.x - 12), player.y - (ballStart.y + 5)) < 5)) {
                    opponentKickTriggered = true;
                    executeOpponentShot();
                }
            }

            if (gameState === 'DEFEND_PICK') {
                if (gameMode === '1P' && currentKicker === 1) {
                    defendTimer--;
                    if (defendTimer <= 0) resolveDefend(aiPickZone(kickZone));
                }
                // 1P && currentKicker === 2 (플레이어가 직접 막는 상황)와 2P 모드는
                // 자동 타이머로 넘기지 않고 플레이어가 직접 6개 중 하나를 탭할 때까지 대기한다.
            }

            if (gameState === 'KICKED' || gameState === 'RESULT') {
                let dx = ball.targetX - ball.x; let dy = ball.targetY - ball.y;
                let ballSpeed = powerBar.power === 'PERFECT' ? 0.22 : (powerBar.power === 'WEAK' ? 0.10 : 0.25);
                if (isTenseRound) ballSpeed *= 0.55; // 결정적인 순간엔 슬로우모션으로 긴장감 연출

                if (Math.hypot(dx, dy) > 5) {
                    ball.x += dx * ballSpeed; ball.y += dy * ballSpeed; ball.rotation += (ballSpeed * 2);
                } else { ball.x = ball.targetX; ball.y = ball.targetY; }

                // 포스트/크로스바 접촉 지점에 도달하면 튕겨나가는 방향으로 목표를 다시 설정
                if (pendingBounce && !pendingBounce.triggered) {
                    const bd = Math.hypot(ball.x - ball.targetX, ball.y - ball.targetY);
                    if (bd < 6) {
                        pendingBounce.triggered = true;
                        sfxClang(); vibrate(60);
                        screenShakeFrames = 12; screenShakeMag = 7;
                        ball.targetX = pendingBounce.afterX;
                        ball.targetY = pendingBounce.afterY;
                    }
                }

                let progress = (ballStart.y - ball.y) / (ballStart.y - goal.y);
                ball.radius = 10 * (1 - progress * 0.4);
            }

            if (keeper.state === 'DIVING') {
                keeper.x += (keeper.targetX - keeper.x) * 0.15; keeper.y += (keeper.targetY - keeper.y) * 0.15;
            }

            offCtx.clearRect(0, 0, OFF_WIDTH, OFF_HEIGHT);
            offCtx.save();
            offCtx.scale(1 / PIXEL_SCALE, 1 / PIXEL_SCALE);

            if (screenShakeFrames > 0) {
                screenShakeFrames--;
                const sMag = screenShakeMag * (screenShakeFrames / 12);
                offCtx.translate((Math.random() - 0.5) * sMag, (Math.random() - 0.5) * sMag);
            }

            drawStadium(offCtx);
            drawGoal(offCtx);
            drawKeeper(offCtx);
            if (gameState !== 'RESULT' || resultTimer > 0) drawBall(offCtx);
            if (gameState !== 'GAMEOVER') drawPlayer(offCtx);
            drawTargetCursor(offCtx);
            drawPowerBar(offCtx);
            if (gameState !== 'GAMEOVER') drawScoreboardUI(offCtx);

            confetti = confetti.filter(p => p.y < HEIGHT + 60);
            for (let p of confetti) {
                offCtx.fillStyle = p.color; offCtx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
            }

            if (gameState === 'DEFEND_PICK' && gameMode === '1P' && currentKicker === 1) {
                offCtx.save();
                offCtx.textAlign = 'center';
                offCtx.font = 'bold 16px "Courier New"'; offCtx.fillStyle = '#fff';
                offCtx.strokeStyle = '#111'; offCtx.lineWidth = 3;
                offCtx.strokeText('골키퍼가 방향을 고르는 중...', WIDTH / 2, 470);
                offCtx.fillText('골키퍼가 방향을 고르는 중...', WIDTH / 2, 470);
                offCtx.restore();
            }

            if (gameState === 'OPP_PREP') {
                offCtx.save();
                offCtx.textAlign = 'center';
                offCtx.font = 'bold 15px "Courier New"'; offCtx.fillStyle = '#fff';
                offCtx.strokeStyle = '#111'; offCtx.lineWidth = 3;
                const msg = `${opponentKit.name} 선수가 슈팅 준비 중...`;
                offCtx.strokeText(msg, WIDTH / 2, 470);
                offCtx.fillText(msg, WIDTH / 2, 470);
                if (tellActive && gameMode === '1P' && difficulty === 'EASY') {
                    offCtx.font = 'bold 13px "Courier New"'; offCtx.fillStyle = '#ffea00';
                    offCtx.strokeStyle = '#111'; offCtx.lineWidth = 3;
                    const hint = '자세를 잘 보세요!';
                    offCtx.strokeText(hint, WIDTH / 2, 490);
                    offCtx.fillText(hint, WIDTH / 2, 490);
                }
                offCtx.restore();
            }

            if (gameState === 'RESULT') {
                resultTimer--;
                offCtx.save();
                offCtx.font = 'bold 54px "Courier New"'; offCtx.textAlign = 'center';
                offCtx.fillStyle = resultText === 'GOAL!' ? '#f1c40f' : '#e74c3c';
                offCtx.strokeStyle = '#111'; offCtx.lineWidth = 6;
                offCtx.strokeText(resultText, WIDTH / 2, HEIGHT / 2 - 30);
                offCtx.fillText(resultText, WIDTH / 2, HEIGHT / 2 - 30);
                offCtx.restore();
                if (resultTimer <= 0) resetRound();
            }

            if (gameState === 'GAMEOVER') {
                offCtx.fillStyle = '#1b3a26'; offCtx.fillRect(0, 0, WIDTH, HEIGHT);
                if (celebrationActive) {
                    drawFireworks(offCtx);
                    updateAndDrawLosers(offCtx);
                    updateAndDrawCelebration(offCtx);
                }

                offCtx.fillStyle = 'rgba(0, 0, 0, 0.45)'; offCtx.fillRect(0, 0, WIDTH, HEIGHT);

                const PY = HEIGHT / 2 - 160;
                offCtx.fillStyle = '#1e3016'; offCtx.beginPath(); offCtx.roundRect(25, PY, 350, 340, 15); offCtx.fill();
                offCtx.strokeStyle = '#f1c40f'; offCtx.lineWidth = 4; offCtx.stroke();
                offCtx.textAlign = 'center';

                if (gameMode === '1P') {
                    const isWin = winner === 1;
                    const winFlagKit = isWin ? p1Kit : opponentKit;

                    drawFlagIcon(offCtx, winFlagKit, WIDTH/2 - 23, PY + 20, 46, 30);
                    offCtx.strokeStyle = '#ffea00'; offCtx.lineWidth = 2;
                    offCtx.strokeRect(WIDTH/2 - 23, PY + 20, 46, 30);

                    offCtx.font = 'bold 38px "Courier New"';
                    offCtx.fillStyle = isWin ? '#3498db' : '#e74c3c';
                    offCtx.strokeStyle = '#111'; offCtx.lineWidth = 5;
                    const label = isWin ? 'WIN!' : 'LOSE...';
                    offCtx.strokeText(label, WIDTH / 2, PY + 90);
                    offCtx.fillText(label, WIDTH / 2, PY + 90);

                    drawFlagIcon(offCtx, p1Kit, WIDTH/2 - 66, PY + 112, 20, 14);
                    drawFlagIcon(offCtx, opponentKit, WIDTH/2 + 46, PY + 112, 20, 14);
                    offCtx.font = 'bold 12px "Courier New"'; offCtx.fillStyle = '#fff';
                    offCtx.fillText('VS', WIDTH / 2, PY + 123);

                    offCtx.font = 'bold 48px "Courier New"'; offCtx.fillStyle = '#f1c40f';
                    offCtx.fillText(`${score1} : ${score2}`, WIDTH / 2, PY + 185);

                    if (maxAttempts > 5) {
                        offCtx.font = 'bold 12px "Courier New"'; offCtx.fillStyle = '#ccc';
                        offCtx.fillText('(승부차기 연장 끝에 결정)', WIDTH / 2, PY + 218);
                    }

                    if (isWin && playerStats.streak >= 2) {
                        offCtx.font = 'bold 15px "Courier New"';
                        offCtx.fillStyle = justHitNewBestStreak ? '#ffea00' : '#ff6b6b';
                        offCtx.strokeStyle = '#111'; offCtx.lineWidth = 3;
                        const streakMsg = justHitNewBestStreak ? `🔥 신기록! ${playerStats.streak}연승 달성!` : `🔥 ${playerStats.streak}연승 중!`;
                        offCtx.strokeText(streakMsg, WIDTH / 2, PY + 245);
                        offCtx.fillText(streakMsg, WIDTH / 2, PY + 245);
                    }
                } else {
                    const winKit = winner === 1 ? p1Kit : p2Kit;

                    offCtx.font = 'bold 15px "Courier New"'; offCtx.fillStyle = '#fff';
                    offCtx.fillText('RESULT', WIDTH / 2, PY + 20);

                    drawFlagIcon(offCtx, winKit, WIDTH/2 - 21, PY + 30, 42, 28);
                    offCtx.strokeStyle = '#ffea00'; offCtx.lineWidth = 2;
                    offCtx.strokeRect(WIDTH/2 - 21, PY + 30, 42, 28);

                    drawFlagIcon(offCtx, p1Kit, WIDTH/2 - 66, PY + 74, 20, 14);
                    drawFlagIcon(offCtx, p2Kit, WIDTH/2 + 46, PY + 74, 20, 14);
                    offCtx.font = 'bold 11px "Courier New"'; offCtx.fillStyle = '#ccc';
                    offCtx.fillText('P1', WIDTH/2 - 56, PY + 96);
                    offCtx.fillText('P2', WIDTH/2 + 56, PY + 96);
                    offCtx.fillStyle = '#fff'; offCtx.font = 'bold 12px "Courier New"';
                    offCtx.fillText('VS', WIDTH / 2, PY + 85);

                    offCtx.font = 'bold 42px "Courier New"'; offCtx.fillStyle = '#f1c40f';
                    offCtx.fillText(`${score1} : ${score2}`, WIDTH / 2, PY + 155);
                    offCtx.font = 'bold 22px "Courier New"';
                    offCtx.fillStyle = '#3498db';
                    offCtx.strokeStyle = '#111'; offCtx.lineWidth = 4;
                    const winnerText = `${winKit.name} (P${winner}) WIN!`;
                    offCtx.strokeText(winnerText, WIDTH / 2, PY + 195);
                    offCtx.fillText(winnerText, WIDTH / 2, PY + 195);
                    if (maxAttempts > 5) {
                        offCtx.font = 'bold 12px "Courier New"'; offCtx.fillStyle = '#ccc';
                        offCtx.fillText('(승부차기 연장 끝에 결정)', WIDTH / 2, PY + 225);
                    }
                }
            }


            offCtx.restore();

            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.drawImage(offCanvas, 0, 0, OFF_WIDTH, OFF_HEIGHT, 0, 0, WIDTH, HEIGHT);
        } else {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
        }
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // ★ 화면 크기에 맞춰 400x700 게임판을 통째로 축소/확대 (반응형 처리)
    function fitGameContainer() {
        const el = document.getElementById('gameContainer');
        const vv = window.visualViewport;
        const viewportW = vv ? vv.width : window.innerWidth;
        const viewportH = vv ? vv.height : window.innerHeight;
        const isMobile = viewportW <= 768;
        let scale;
        if (isMobile) {
            // 모바일: 화면 전체를 빈틈없이 채우도록 확대(필요하면 살짝 잘림) - 창처럼 보이지 않게
            scale = Math.max(viewportW / 400, viewportH / 700);
        } else {
            // 데스크톱: 넓은 화면에서 억지로 꽉 채우면 과도하게 확대/잘리므로 기존처럼 카드 형태 유지
            const availW = viewportW - 32;
            const availH = viewportH - 40;
            scale = Math.min(1, availW / 400, availH / 700);
        }
        el.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', fitGameContainer);
    window.addEventListener('orientationchange', fitGameContainer);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fitGameContainer);
        window.visualViewport.addEventListener('scroll', fitGameContainer);
    }
    fitGameContainer();
    setTimeout(fitGameContainer, 300);
    setTimeout(fitGameContainer, 1000);
</script>
