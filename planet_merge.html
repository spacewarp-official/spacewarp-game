      bodyEl.style.backgroundImage = 'url("' + lv.cloudImg + '")';
      bodyEl.style.backgroundSize = '92% 92%';
      bodyEl.style.backgroundRepeat = 'no-repeat';
      bodyEl.style.backgroundPosition = 'center';
      bodyEl.style.borderRadius = '0';
      inner.appendChild(bodyEl);
      setPlanetSize(inner, sizePx);
      return inner;
    }

    bodyEl.style.background = lv.bg;
    let shadow = lv.glow ? lv.glow : '';
    if (lv.shape === 'blob') {
      // [요청] 우주먼지는 동그란 구가 아니라, 끝은 흐릿하지만 경계는 보이는 둥근 사각형 느낌으로
      bodyEl.style.borderRadius = '38% 42% 40% 36% / 42% 38% 44% 40%';
      const blur = Math.max(3, sizePx * 0.16);
      const blobShadow = 'inset 0 0 ' + blur + 'px rgba(255,255,255,0.55), 0 0 ' + blur + 'px rgba(255,255,255,0.25)';
      shadow = shadow ? (shadow + ', ' + blobShadow) : blobShadow;
    } else {
      bodyEl.style.borderRadius = '50%';
    }
    if (shadow) bodyEl.style.boxShadow = shadow;

    const face = document.createElement('div');
    face.className = 'p-face';
    const eyesEl = document.createElement('div');
    eyesEl.className = 'p-eyes';
    eyesEl.textContent = lv.eyes;
    eyesEl.style.color = lv.eyeColor || '#2b2b2b';
    face.appendChild(eyesEl);
    if (lv.mouth) {
      const mouthEl = document.createElement('div');
      mouthEl.className = 'p-mouth';
      mouthEl.textContent = lv.mouth;
      mouthEl.style.color = lv.eyeColor || '#2b2b2b';
      face.appendChild(mouthEl);
    }
    inner.appendChild(bodyEl);
    inner.appendChild(face);
    setPlanetSize(inner, sizePx);
    return inner;
  }

  function setPlanetSize(inner, sizePx){
    const eyesEl = inner.querySelector('.p-eyes');
    if (eyesEl) eyesEl.style.fontSize = Math.max(6, sizePx * 0.26) + 'px';
    const mouthEl = inner.querySelector('.p-mouth');
    if (mouthEl) mouthEl.style.fontSize = Math.max(5, sizePx * 0.2) + 'px';
  }

  const canvasContainer = document.getElementById('canvas-container');
  const deadlineLineEl = document.getElementById('deadline-line');
  deadlineLineEl.style.top = (DEADLINE_Y / H * 100) + '%';

  const wallOpts = { isStatic: true, friction: 0.5 };
  const ground = Bodies.rectangle(W/2, H+10, W, 20, wallOpts);
  const leftWall = Bodies.rectangle(-10, H/2, 20, H, wallOpts);
  const rightWall = Bodies.rectangle(W+10, H/2, 20, H, wallOpts);
  Composite.add(engine.world, [ground, leftWall, rightWall]);

  const animalVisuals = new Map(); // body.id -> { body, div, level }

  function createAnimalVisual(body, level){
    const scale = canvasContainer.clientWidth / W;
    const sizePx = levels[level].radius * 2 * scale;
    const wrapper = document.createElement('div');
    wrapper.className = 'animal-sprite';
    wrapper.style.width = sizePx + 'px';
    wrapper.style.height = sizePx + 'px';
    wrapper.appendChild(buildPlanetInner(level, sizePx));
    canvasContainer.appendChild(wrapper);
    animalVisuals.set(body.id, { body: body, div: wrapper, level: level });
  }

  function removeAnimalVisual(body){
    const entry = animalVisuals.get(body.id);
    if (entry) { entry.div.remove(); animalVisuals.delete(body.id); }
  }

  function resizeOneSprite(entry){
    const scale = canvasContainer.clientWidth / W;
    const sizePx = levels[entry.level].radius * 2 * scale;
    entry.div.style.width = sizePx + 'px';
    entry.div.style.height = sizePx + 'px';
    setPlanetSize(entry.div.firstElementChild, sizePx);
  }

  function syncAllSpriteSizes(){
    animalVisuals.forEach(resizeOneSprite);
    syncAimUI();
  }

  function syncVisualPositions(){
    const scale = canvasContainer.clientWidth / W;
    animalVisuals.forEach(function(entry){
      const b = entry.body;
      const x = b.position.x * scale;
      const y = b.position.y * scale;
      entry.div.style.transform = 'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%) rotate(' + b.angle + 'rad)';
    });
  }
  Events.on(engine, 'afterUpdate', syncVisualPositions);
  window.addEventListener('resize', syncAllSpriteSizes);

  let audioCtx = null;
  function ensureAudio(){
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { console.warn('오디오 초기화 실패(무음으로 진행):', e); }
  }
  function playPop(freq){
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.7, t + 0.09);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.22);
    } catch (e) { /* 무시 */ }
  }

  const BEST_KEY = 'planetMergeBestScore';
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch (e) {}
  const bestScoreVal = document.getElementById('best-score-val');
  bestScoreVal.textContent = bestScore;

  let score = 0;
  let isGameOver = false;
  let gameOverTimer = 0;
  let lastDropTime = 0;
  let canDrop = true;
  let aimX = W / 2;
  let mergeCount = 0;
  const sessionStart = Date.now();

  const scoreVal = document.getElementById('score-val');
  const nextVal = document.getElementById('next-val');
  const aimHolder = document.getElementById('aim-holder');
  const aimEmoji = document.getElementById('aim-emoji');
  const timeVal = document.getElementById('time-val');
  const totalCountVal = document.getElementById('total-count-val');
  let totalCreated = 0;
  function bumpTotalCreated(){
    totalCreated += 1;
    totalCountVal.textContent = totalCreated;
  }
  function formatElapsed(totalSec){
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }
  function getElapsedSec(){
    return Math.floor((Date.now() - sessionStart) / 1000);
  }
  setInterval(function(){
    if (isGameOver) return;
    timeVal.textContent = formatElapsed(getElapsedSec());
  }, 1000);

  function updateScore(delta){
    score += delta;
    scoreVal.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      bestScoreVal.textContent = bestScore;
      try { localStorage.setItem(BEST_KEY, String(bestScore)); } catch (e) {}
    }
  }

  function getRandomLevel() {
    const rand = Math.random();
    if (rand < 0.40) return 0;
    if (rand < 0.68) return 1;
    if (rand < 0.85) return 2;
    if (rand < 0.95) return 3;
    return MAX_DROP_LEVEL;
  }

  let currentLevel = getRandomLevel();
  let nextLevel = getRandomLevel();

  function syncAimUI() {
    const scale = canvasContainer.clientWidth / W;
    aimEmoji.innerHTML = '';
    const aimSizePx = Math.max(18, levels[currentLevel].radius * 2 * scale);
    aimEmoji.style.width = aimSizePx + 'px';
    aimEmoji.style.height = aimSizePx + 'px';
    aimEmoji.appendChild(buildPlanetInner(currentLevel, aimSizePx));

    nextVal.innerHTML = '';
    nextVal.appendChild(buildPlanetInner(nextLevel, 30));
  }
  syncAimUI();

  function clientXToGameX(clientX) {
    const bounds = canvasContainer.getBoundingClientRect();
    const scale = W / bounds.width;
    return (clientX - bounds.left) * scale;
  }

  function updateAim(clientX) {
    if (isGameOver) return;
    const radius = levels[currentLevel].radius;
    let x = clientXToGameX(clientX);
    x = Math.max(radius, Math.min(x, W - radius));
    aimX = x;
    const pct = (x / W) * 100;
    aimHolder.style.left = pct + '%';
  }

  window.addEventListener('pointermove', function(e){ updateAim(e.clientX); });

  window.addEventListener('pointerdown', function(e){
    ensureAudio();
    if (isGameOver || !canDrop) return;
    if (!e.target.closest('#canvas-container')) return;
    if (e.target.closest('.modal-overlay')) return;

    updateAim(e.clientX);

    const now = Date.now();
    if (now - lastDropTime < 550) return;
    lastDropTime = now;
    canDrop = false;
    aimHolder.style.opacity = '0';

    const lvl = currentLevel;
    const animal = Bodies.circle(aimX, 40, levels[lvl].radius, {
      restitution: 0.15, friction: 0.3, frictionAir: 0.001,
      label: 'animal_' + lvl
    });
    Composite.add(engine.world, animal);
    createAnimalVisual(animal, lvl);
    bumpTotalCreated();

    setTimeout(function(){
      if (isGameOver) return;
      currentLevel = nextLevel;
      nextLevel = getRandomLevel();
      syncAimUI();
      aimHolder.style.opacity = '1';
      canDrop = true;
    }, 550);
  });

  Events.on(engine, 'collisionStart', function(event){
    event.pairs.forEach(function(pair){
      const bodyA = pair.bodyA, bodyB = pair.bodyB;
      if (bodyA.label.startsWith('animal_') && bodyA.label === bodyB.label) {
        const level = parseInt(bodyA.label.split('_')[1], 10);
        if (level < levels.length - 1 && !bodyA.isRemoving && !bodyB.isRemoving) {
          bodyA.isRemoving = true; bodyB.isRemoving = true;
          const newX = (bodyA.position.x + bodyB.position.x) / 2;
          const newY = (bodyA.position.y + bodyB.position.y) / 2;
          Composite.remove(engine.world, [bodyA, bodyB]);
          removeAnimalVisual(bodyA);
          removeAnimalVisual(bodyB);

          updateScore((level + 1) * 10);
          mergeCount += 1;

          const mergedLevel = level + 1;
          const newAnimal = Bodies.circle(newX, newY, levels[mergedLevel].radius, {
            label: 'animal_' + mergedLevel, restitution: 0.15, friction: 0.3, frictionAir: 0.001
          });
          Composite.add(engine.world, newAnimal);
          createAnimalVisual(newAnimal, mergedLevel);
          bumpTotalCreated();
          spawnPopEffect(newX, newY, mergedLevel);
        }
      }
    });
  });

  function spawnPopEffect(x, y, level){
    const scale = canvasContainer.clientWidth / W;
    const cx = x * scale, cy = y * scale;

    const main = document.createElement('div');
    main.style.cssText = 'position:absolute;left:' + cx + 'px;top:' + cy + 'px;width:30px;height:30px;' +
      'transform:translate(-50%,-50%) scale(1);pointer-events:none;z-index:50;' +
      'transition:transform .35s ease-out, opacity .35s ease-out;';
    main.appendChild(buildPlanetInner(level, 30));
    canvasContainer.appendChild(main);
    requestAnimationFrame(function(){
      main.style.transform = 'translate(-50%,-90%) scale(1.7)';
      main.style.opacity = '0';
    });
    setTimeout(function(){ main.remove(); }, 380);

    const sparkles = ['✨', '⭐', '💫'];
    const count = 6;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.textContent = sparkles[i % sparkles.length];
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
      const dist = 26 + Math.random() * 14;
      const dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist;
      p.style.cssText = 'position:absolute;left:' + cx + 'px;top:' + cy + 'px;' +
        'transform:translate(-50%,-50%) scale(0.8);font-size:14px;pointer-events:none;z-index:49;opacity:1;' +
        'transition:transform .45s ease-out, opacity .45s ease-out;';
      canvasContainer.appendChild(p);
      (function(p, dx, dy){
        requestAnimationFrame(function(){
          p.style.transform = 'translate(' + (dx - 8) + 'px,' + (dy - 8) + 'px) scale(1.1)';
          p.style.opacity = '0';
        });
      })(p, dx, dy);
      setTimeout(function(){ p.remove(); }, 470);
    }

    playPop(320 + level * 30);
  }

  Events.on(engine, 'beforeUpdate', function(){
    if (isGameOver) return;
    let overLineDetected = false;
    Composite.allBodies(engine.world).forEach(function(body){
      if (body.label.startsWith('animal_')) {
        const topY = body.position.y - body.circleRadius;
        if (topY < DEADLINE_Y && Math.abs(body.velocity.y) < 0.5) overLineDetected = true;
      }
    });

    if (overLineDetected) {
      gameOverTimer++;
      if (gameOverTimer > 180) {
        isGameOver = true;
        Runner.stop(runner);
        document.getElementById('game-over-modal').style.display = 'flex';
      }
    } else {
      gameOverTimer = 0;
    }
  });

  Runner.run(runner, engine);

  document.getElementById('info-btn').addEventListener('click', function(){
    const container = document.getElementById('evo-tree-container');
    container.innerHTML = '';
    levels.forEach(function(lv, idx){
      const item = document.createElement('div');
      item.className = 'evo-item';
      const holder = document.createElement('div');
      holder.className = 'evo-planet-holder';
      holder.appendChild(buildPlanetInner(idx, 40));
      const textSpan = document.createElement('span');
      textSpan.className = 'evo-text';
      textSpan.textContent = lv.name + ' Lv.' + (idx+1);
      const personalitySpan = document.createElement('span');
      personalitySpan.className = 'evo-personality';
      personalitySpan.textContent = lv.personality;
      item.appendChild(holder);
      item.appendChild(textSpan);
      item.appendChild(personalitySpan);
      container.appendChild(item);
    });
    document.getElementById('info-modal').style.display = 'flex';
  });

  document.getElementById('close-info').addEventListener('click', function(){
    document.getElementById('info-modal').style.display = 'none';
  });

  document.getElementById('rank-btn').addEventListener('click', async function(){
    document.getElementById('rank-modal').style.display = 'flex';
    const container = document.getElementById('rank-list-container');
    container.innerHTML = '';

    if (!supabase) {
      // 오프라인/DB 미연동 상태의 임시 표시 데이터(점수 우선, 동점시 시간 빠른 순)
      const fallback = [
        ['관리자', 9999, 95], ['유저', 8500, 130]
      ];
      fallback.forEach(function(row, i){ appendRankRow(container, i+1, row[0], row[1], row[2]); });
      const note = document.createElement('div');
      note.style.cssText = 'font-size:12px;color:#999;margin-top:8px;';
      note.textContent = '(DB 미연동 — 임시 데이터)';
      container.appendChild(note);
      return;
    }

    container.textContent = '데이터 로딩 중...';
    try {
      // 정렬 기준: 점수 내림차순 → 동점이면 소요시간(elapsed_sec) 오름차순(더 빠른 사람이 위)
      // ※ Supabase의 rankings 테이블에 elapsed_sec(정수, 초 단위) 컬럼이 있어야 함.
      const { data, error } = await supabase
        .from('planet_scores')
        .select('username, score, elapsed_sec')
        .order('score', { ascending: false })
        .order('elapsed_sec', { ascending: true })
        .limit(5);
      if (error) throw error;
      container.innerHTML = '';
      data.forEach(function(row, i){ appendRankRow(container, i+1, row.username, row.score, row.elapsed_sec); });
    } catch (e) {
      container.textContent = '데이터 불러오기 실패';
    }
  });

  function appendRankRow(container, rank, username, scoreVal, elapsedSec){
    const row = document.createElement('div');
    const left = document.createElement('span');
    left.textContent = rank + '. ' + String(username);
    const right = document.createElement('span');
    const scoreB = document.createElement('b');
    scoreB.textContent = String(scoreVal);
    right.appendChild(scoreB);
    if (elapsedSec !== undefined && elapsedSec !== null) {
      const timeSpan = document.createElement('span');
      timeSpan.className = 'rank-time';
      timeSpan.textContent = ' (' + formatElapsed(elapsedSec) + ')';
      right.appendChild(timeSpan);
    }
    row.appendChild(left);
    row.appendChild(right);
    container.appendChild(row);
  }

  document.getElementById('close-rank').addEventListener('click', function(){
    document.getElementById('rank-modal').style.display = 'none';
  });

  document.getElementById('save-restart-btn').addEventListener('click', async function(){
    const raw = document.getElementById('user-name').value || '';
    const name = raw.trim().slice(0, 10) || '익명';

    const elapsedSec = getElapsedSec();
    const plausible = mergeCount >= 0 && score <= (mergeCount + 1) * 150 && elapsedSec > 1;

    if (supabase && plausible) {
      try {
        await supabase.from('planet_scores').insert([{ username: name, score: score, elapsed_sec: elapsedSec }]);
      } catch (e) { console.error('Save Error', e); }
    } else if (supabase && !plausible) {
      console.warn('비정상 점수로 판단되어 저장을 건너뜁니다.');
    }
    location.reload();
  });
})();
</script>
