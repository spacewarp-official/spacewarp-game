<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페이스워프 by geunseongroh</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        body { background-color: #f8f9fa; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 36px; font-weight: 800; color: #111; letter-spacing: -1px; margin-bottom: 10px; }
        .header p { font-size: 16px; color: #666; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; width: 100%; }

        .game-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: all 0.3s ease; text-decoration: none; color: inherit; display: flex; flex-direction: column; cursor: pointer; border: 1px solid #eee; }
        .game-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: #222; }
        
        .card-img { height: 160px; background: #e9ecef; display: flex; justify-content: center; align-items: center; font-size: 48px; }
        .tetris-bg { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .coming-bg { background: #f1f3f5; color: #adb5bd; }

        .card-content { padding: 25px; }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .card-desc { font-size: 14px; color: #777; line-height: 1.5; }
        
        .badge { display: inline-block; padding: 5px 10px; font-size: 12px; font-weight: bold; border-radius: 20px; margin-bottom: 15px; }
        .badge-active { background-color: #111; color: #fff; }
        .badge-soon { background-color: #e9ecef; color: #666; }

        .footer { margin-top: auto; padding-top: 50px; color: #aaa; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SpaceWarp Arcade</h1>
        <p>당신의 빈 공간을 채우는 작은 놀이터</p>
    </div>

    <div class="game-grid">
        <a href="tetris.html" class="game-card">
            <div class="card-img tetris-bg">🧩</div>
            <div class="card-content">
                <span class="badge badge-active">PLAY NOW</span>
                <div class="card-title">한글 테트리스</div>
                <div class="card-desc">집현전에서 세종이 내는 과제를 줄을 맞춰 없애보자.</div>
            </div>
        </a>

        <div class="game-card" style="cursor: default;">
            <div class="card-img coming-bg">🔒</div>
            <div class="card-content">
                <span class="badge badge-soon">COMING SOON</span>
                <div class="card-title">비밀의 방</div>
                <div class="card-desc">새로운 인테리어 퍼즐이 현재 열심히 공사 중입니다. 기대해 주세요!</div>
            </div>
        </div>
        
        <div class="game-card" style="cursor: default;">
            <div class="card-img coming-bg">💡</div>
            <div class="card-content">
                <span class="badge badge-soon">COMING SOON</span>
                <div class="card-title">당신이 원하는 게임을 준비 중</div>
                <div class="card-desc"> 당신이 요청하는 새로운 미니 게임이 추가될 예정입니다.</div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 SPACEWARP by geunseongroh. All rights reserved.
    </div>

</body>
</html>
