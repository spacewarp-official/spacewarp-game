  /* [핵심 구조] canvas 렌더링을 배제하고 물리는 Matter.js(비가시), 시각은 전부 DOM으로 동기화 */
  #canvas-container {
    position: relative; width: 100%; aspect-ratio: 400 / 600; overflow: hidden;
    background:
      radial-gradient(1px 1px at 10% 15%, #fff, transparent),
      radial-gradient(1px 1px at 25% 45%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 40% 20%, #fff, transparent),
      radial-gradient(1px 1px at 60% 65%, #fff, transparent),

      radial-gradient(1.5px 1.5px at 85% 55%, #fff, transparent),
      radial-gradient(1px 1px at 15% 75%, #fff, transparent),
      radial-gradient(1px 1px at 92% 80%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 50% 90%, #fff, transparent),
      linear-gradient(180deg, #140c33, #08051b);
    background-repeat: no-repeat;
  }

  #deadline-line {
    position: absolute; left: 0; width: 100%; border-top: 2px dashed rgba(255, 107, 107, 0.65);
    z-index: 2;

  /* 물리 오브젝트(떨어지는/쌓인 행성) 래퍼 — transform으로만 위치/회전을 움직인다 */
  .animal-sprite { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }

  /* [캐릭터성 부여] 행성 하나 = 몸체(그라디언트 구체) + 얼굴(눈/입). 눈·입 모양과 색은
     levels[] 데이터에서 단계별로 다르게 지정해 "성격"을 표현한다. */
  .planet { position: relative; width: 100%; height: 100%; }
  .p-body { position: absolute; inset: 0; z-index: 1; }
  .p-ring {
    position: absolute; top: 50%; left: 50%; width: 172%; height: 34%;
    background: rgba(235, 220, 185, 0.9); border-radius: 50%;
    box-shadow: 0 0 4px rgba(0,0,0,0.15);
    transform: translate(-50%, -50%) rotate(-16deg);
    z-index: 0;

  .p-face { position: absolute; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #aim-holder {
    position: absolute; top: 4%; left: 50%; width: 24%; aspect-ratio: 1;
    transform: translateX(-50%); pointer-events: none; z-index: 3;
    transition: left 0.05s linear, opacity 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  #aim-holder .rocket-bg { display: none; } /* 구버전 로켓 이미지는 더 이상 사용하지 않음 */

  /* [신규] 워프 링(Warp Ring) - SPACEWARP 컨셉: 시공간 고리가 회전하며 그 중심에서 행성이 뿅 등장 */
  #aim-holder .warp-ring-bg { position: absolute; inset: -18%; z-index: 1; }
  #aim-holder .warp-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 3px solid transparent;
    background: conic-gradient(from 0deg, #00f0ff, #a855f7, #00f0ff 60%, transparent 75%, #00f0ff) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    filter: drop-shadow(0 0 6px rgba(0,240,255,0.85));
    animation: warpSpin 1.4s linear infinite;
  }
  #aim-holder .warp-ring.ring2 {
    inset: 14%;
    background: conic-gradient(from 180deg, #ff00ff, #00f0ff, #ff00ff 60%, transparent 75%, #ff00ff) border-box;
    animation: warpSpin 1s linear infinite reverse;
    opacity: 0.85;
  }
  @keyframes warpSpin { to { transform: rotate(360deg); } }
  #aim-holder .warp-core {
    position: absolute; inset: 30%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(0,240,255,0.25) 60%, transparent 75%);
    animation: warpPulse 1.2s ease-in-out infinite;
  }
  @keyframes warpPulse { 0%,100% { opacity: 0.55; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.05); } }
  /* 크기는 CSS 고정값이 아니라 JS(syncAimUI)에서 실제 반지름 기준으로 매 순간 지정 */

</style>

<script>
(function(){
  'use strict';

  function showBootError(msg){
    var el = document.getElementById('boot-error');
    el.style.display = 'block';
    el.textContent = '⚠ 게임 로드 실패: ' + msg;
    console.error(msg);
  }
  window.addEventListener('error', function(e){
    showBootError(e.message + ' (' + (e.filename||'') + ':' + (e.lineno||'') + ')');
  });

  if (typeof Matter === 'undefined') {
    showBootError('Matter.js 로드 실패 — CDN 접속이 차단되었거나 네트워크 오류입니다.');
    return;
  }

  let supabase = null;
  try {
    const SUPABASE_URL = 'https://pvjrbhsgffadiklpiknk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_d4NBdGqpxrg__1SXiRA-YA_TDutoT7B';
    if (!SUPABASE_URL.includes('YOUR') && window.supabase) {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch (error) { console.error('Supabase Init Error:', error); }

  const { Engine, Runner, Bodies, Composite, Events } = Matter;
  const engine = Engine.create();
  // [수정] 위치/속도 보정 반복 횟수를 늘려 천체 사이 겹침 해소가 더 정밀해지고,
  // 결과적으로 정지 상태에서 서로 더 밀착해서 쌓이도록 함(기본값 6/4 → 10/8).
  engine.positionIterations = 10;
  engine.velocityIterations = 8;
  const runner = Runner.create();

  const W = 400, H = 600;
  const DEADLINE_Y = 150;

  // [캐릭터성] 각 단계마다 실제 천체의 특징에 맞춰 몸체 색/눈/입 모양을 다르게 부여.
  // eyes/mouth는 유니코드 문자로 표현 — 크기(font-size)만 조절하면 어떤 크기에서도
  // 깨지지 않고 또렷하게 보인다.

    { id: 'merge_star', label: '항성 1번 만들기', targetLevel: 7, targetCount: 1 }
  ];
  function getTodayMission() {
    const todayStr = new Date().toDateString();
    const dayIndex = Math.floor(Date.now() / 86400000);
    const mission = DAILY_MISSIONS[dayIndex % DAILY_MISSIONS.length];
    const saved = JSON.parse(localStorage.getItem('planetMerge_missionState') || '{}');
    if (saved.date !== todayStr) {
      const fresh = { date: todayStr, missionId: mission.id, progress: 0, done: false };
      localStorage.setItem('planetMerge_missionState', JSON.stringify(fresh));
      return { mission: mission, state: fresh };
    }
    return { mission: mission, state: saved };
  }
  function updateMissionProgress(mergedLevelIdx, currentScore) {
    const { mission, state } = getTodayMission();
    if (state.done) return;
    let changed = false;
    if (mission.targetLevel !== undefined && mergedLevelIdx === mission.targetLevel) {
      state.progress = (state.progress || 0) + 1;
      changed = true;
      if (state.progress >= mission.targetCount) state.done = true;
    } else if (mission.scoreTarget !== undefined && currentScore >= mission.scoreTarget) {
      state.progress = mission.scoreTarget;
      state.done = true;
      changed = true;
    }
    if (changed) {
      localStorage.setItem('planetMerge_missionState', JSON.stringify(state));
      renderMissionBadge();
      if (state.done) showMissionCompleteToast(mission.label);
    }
  }
  function renderMissionBadge() {
    const el = document.getElementById('daily-mission-badge');
    if (!el) return;
    const { mission, state } = getTodayMission();
    const progressText = mission.scoreTarget !== undefined
      ? (state.done ? '완료!' : '진행중')
      : (Math.min(state.progress || 0, mission.targetCount) + '/' + mission.targetCount);
    el.innerHTML = (state.done ? '✅ ' : '🎯 ') + '오늘의 미션: ' + mission.label + ' (' + progressText + ')';
    el.classList.toggle('mission-done', !!state.done);
  }
  function showMissionCompleteToast(label) {
    const toast = document.createElement('div');
    toast.textContent = '🎉 오늘의 미션 완료! — ' + label;
    toast.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,#7b5ee6,#d16bd6); color:#fff; padding:14px 22px; border-radius:14px; font-family:Jua; font-size:15px; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,0.4); text-align:center;';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.style.transition = 'opacity 0.5s'; toast.style.opacity = '0'; }, 1800);
    setTimeout(function(){ toast.remove(); }, 2300);
  }

  function buildPlanetInner(levelIdx, sizePx){
    const lv = levels[levelIdx];
    const inner = document.createElement('div');
    inner.className = 'planet';

    // [요청] 토성처럼 고리를 가진 캐릭터 — 몸체보다 먼저(뒤에) 그려서 양옆으로만 삐져나와 보이게 함
    if (lv.hasRing) {
      const ring = document.createElement('div');
      ring.className = 'p-ring';
      inner.appendChild(ring);
    }

    const bodyEl = document.createElement('div');
    bodyEl.className = 'p-body';

    // [수정] 우주먼지/운석/행성/은하는 커스텀 캐릭터 이미지를 그대로 사용
    if (lv.cloudImg) {
      bodyEl.style.background = 'transparent';
      bodyEl.style.backgroundImage = 'url("' + lv.cloudImg + '")';
      bodyEl.style.backgroundSize = '116% 116%';
      bodyEl.style.backgroundRepeat = 'no-repeat';
      bodyEl.style.backgroundPosition = 'center';
      bodyEl.style.borderRadius = '0';
      if (lv.glow) bodyEl.style.filter = 'drop-shadow(0 0 ' + (sizePx * 0.18) + 'px ' + lv.glow.replace(/^0 0 \S+px\s*/, '') + ')';
      inner.appendChild(bodyEl);
      setPlanetSize(inner, sizePx);
      return inner;
    }

    bodyEl.style.background = lv.bg;
    let shadow = lv.glow ? lv.glow : '';
    if (lv.shape === 'blob') {
      // [요청] 우주먼지는 동그란 구가 아니라, 끝은 흐릿하지만 경계는 보이는 둥근 사각형 느낌으로
      bodyEl.style.borderRadius = '38% 42% 40% 36% / 42% 38% 44% 40%';
      const blur = Math.max(3, sizePx * 0.16);
      const blobShadow = 'inset 0 0 ' + blur + 'px rgba(255,255,255,0.55), 0 0 ' + blur + 'px rgba(255,255,255,0.25)';
      shadow = shadow ? (shadow + ', ' + blobShadow) : blobShadow;
    } else {
      bodyEl.style.borderRadius = '50%';
    }
    if (shadow) bodyEl.style.boxShadow = shadow;

    const face = document.createElement('div');
    face.className = 'p-face';
    const eyesEl = document.createElement('div');
    eyesEl.className = 'p-eyes';
    eyesEl.textContent = lv.eyes;
    eyesEl.style.color = lv.eyeColor || '#2b2b2b';
    face.appendChild(eyesEl);
    if (lv.mouth) {
      const mouthEl = document.createElement('div');
      mouthEl.className = 'p-mouth';
      mouthEl.textContent = lv.mouth;
      mouthEl.style.color = lv.eyeColor || '#2b2b2b';
      face.appendChild(mouthEl);
    }
    inner.appendChild(bodyEl);
    inner.appendChild(face);
    setPlanetSize(inner, sizePx);
    return inner;
  }

  function setPlanetSize(inner, sizePx){
    const eyesEl = inner.querySelector('.p-eyes');
    if (eyesEl) eyesEl.style.fontSize = Math.max(6, sizePx * 0.26) + 'px';
    const mouthEl = inner.querySelector('.p-mouth');

  const canvasContainer = document.getElementById('canvas-container');
  const deadlineLineEl = document.getElementById('deadline-line');

  const wallOpts = { isStatic: true, friction: 0.5 };

  const animalVisuals = new Map(); // body.id -> { body, div, level }

  function createAnimalVisual(body, level){
    const scale = canvasContainer.clientWidth / W;

  function removeAnimalVisual(body){

  function resizeOneSprite(entry){
    const scale = canvasContainer.clientWidth / W;

    entry.div.style.width = sizePx + 'px';
    entry.div.style.height = sizePx + 'px';

  const METEOR_LEVEL = 1; // 운석의 레벨 인덱스
  const COMET_LEVEL = 2;  // 혜성의 레벨 인덱스 (0=우주먼지, 1=운석, 2=혜성...)
  const TRAIL_STYLES = {
    1: 'radial-gradient(circle, rgba(255,220,140,0.9), rgba(255,120,40,0.35) 55%, transparent 75%)', // 운석: 불꽃
    2: 'radial-gradient(circle, rgba(200,245,255,0.85), rgba(140,220,255,0.25) 60%, transparent 75%)' // 혜성: 얼음
  };
  let lastTrailSpawn = 0;

  function syncVisualPositions(){
    const scale = canvasContainer.clientWidth / W;
    animalVisuals.forEach(function(entry){
      const b = entry.body;
      const x = b.position.x * scale;
      const y = b.position.y * scale;
      entry.div.style.transform = 'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%) rotate(' + b.angle + 'rad)';

      // [신규] 운석(불꽃)·혜성(얼음)이 빠르게 떨어지는 동안 뒤로 트레일을 흩뿌린다
      const trailStyle = TRAIL_STYLES[entry.level];
      if (trailStyle) {
        const speed = Math.sqrt(b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y);
        if (speed > 3) {
          const now = performance.now();
          if (now - lastTrailSpawn > 45) {
            lastTrailSpawn = now;

  let audioCtx = null;
  function ensureAudio(){
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { console.warn('오디오 초기화 실패(무음으로 진행):', e); }
  }
  function playPop(freq){
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.7, t + 0.09);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.22);
    } catch (e) { /* 무시 */ }
  }

  // [신규] 연속 접속 스트릭 + 오늘의 미션 배지 초기화
  (function initStreakAndMission(){

  function clientXToGameX(clientX) {
    const bounds = canvasContainer.getBoundingClientRect();
    const scale = W / bounds.width;
    return (clientX - bounds.left) * scale;
  }

  let lastAimX = aimX;
  let lastWarpTrailSpawn = 0;
  function updateAim(clientX) {
    if (isGameOver) return;
    const radius = levels[currentLevel].radius;
    let x = clientXToGameX(clientX);
    x = Math.max(radius, Math.min(x, W - radius));
    aimX = x;
    const pct = (x / W) * 100;
    aimHolder.style.left = pct + '%';

    // [신규] 조준점이 빠르게 이동할 때 뒤로 빛의 잔상(워프 트레일)을 남긴다
    const moveDist = Math.abs(x - lastAimX);
    lastAimX = x;
    if (moveDist > 2) {
      const now = performance.now();
      if (now - lastWarpTrailSpawn > 35) {
        lastWarpTrailSpawn = now;
        const scale = canvasContainer.clientWidth / W;
        spawnWarpTrail(x * scale, radius * scale);
      }
    }
  }

  function spawnWarpTrail(x, r){
    const bounds = canvasContainer.getBoundingClientRect();
    const holderBounds = aimHolder.getBoundingClientRect();
    const relY = (holderBounds.top - bounds.top) + holderBounds.height / 2;
    const trail = document.createElement('div');
    const size = Math.max(10, r * 1.1);
    trail.style.cssText =
      'position:absolute; left:' + x + 'px; top:' + relY + 'px; width:' + size + 'px; height:' + size + 'px;' +
      'margin:' + (-size/2) + 'px 0 0 ' + (-size/2) + 'px; border-radius:50%; pointer-events:none; z-index:2;' +
      'background: radial-gradient(circle, rgba(0,240,255,0.75), rgba(168,85,247,0.35) 60%, transparent 75%);' +
      'opacity:0.8; transition: opacity 0.4s ease-out, transform 0.4s ease-out;';
    canvasContainer.appendChild(trail);

      trail.style.opacity = '0';

    const lvl = currentLevel;

  Events.on(engine, 'collisionStart', function(event){
    event.pairs.forEach(function(pair){
      const bodyA = pair.bodyA, bodyB = pair.bodyB;
      if (bodyA.label.startsWith('animal_') && bodyA.label === bodyB.label) {
        const level = parseInt(bodyA.label.split('_')[1], 10);
        if (level < levels.length - 1 && !bodyA.isRemoving && !bodyB.isRemoving) {
          bodyA.isRemoving = true; bodyB.isRemoving = true;
          const newX = (bodyA.position.x + bodyB.position.x) / 2;
          const newY = (bodyA.position.y + bodyB.position.y) / 2;
          Composite.remove(engine.world, [bodyA, bodyB]);
          removeAnimalVisual(bodyA);
          removeAnimalVisual(bodyB);

          updateScore((level + 1) * 10);

    if (!supabase) {

      ];
      fallback.forEach(function(row, i){ appendRankRow(container, i+1, row[0], row[1], row[2], row[3]); });
      const note = document.createElement('div');
      note.style.cssText = 'font-size:12px;color:#999;margin-top:8px;';
      note.textContent = '(DB 미연동 — 임시 데이터)';
      container.appendChild(note);
      return;
    }

    container.textContent = '데이터 로딩 중...';
    try {
      // [신규] 은하(최종 진화형) 달성자 중 가장 빠른 기록을 랭킹 최상단에 별도로 고정 표시
      const galaxyRes = await supabase
        .from('planet_scores')
        .select('username, score, elapsed_sec, max_level')
        .eq('max_level', GALAXY_LEVEL)
        .order('elapsed_sec', { ascending: true })
        .limit(1);

      // 정렬 기준: 점수 내림차순 → 동점이면 소요시간(elapsed_sec) 오름차순(더 빠른 사람이 위)
      // ※ Supabase의 planet_scores 테이블에 elapsed_sec, max_level 컬럼이 있어야 함.
      const { data, error } = await supabase
        .from('planet_scores')
        .select('username, score, elapsed_sec, max_level')
        .order('score', { ascending: false })
        .order('elapsed_sec', { ascending: true })
        .limit(5);
      if (error) throw error;
      container.innerHTML = '';

      if (!galaxyRes.error && galaxyRes.data && galaxyRes.data.length > 0) {
        const g = galaxyRes.data[0];
        const badge = document.createElement('div');
        badge.style.cssText = 'background:linear-gradient(135deg,#7b5ee6,#d16bd6); border-radius:10px; padding:8px 12px; margin-bottom:10px; color:#fff; font-size:13px; display:flex; justify-content:space-between; align-items:center;';
        badge.innerHTML = '<span>🌌 은하 달성 — <b>' + escapeHtml(String(g.username)) + '</b></span><span>' + formatElapsed(g.elapsed_sec) + '</span>';
        container.appendChild(badge);
      }

      data.forEach(function(row, i){ appendRankRow(container, i+1, row.username, row.score, row.elapsed_sec, row.max_level); });
    } catch (e) {
      container.textContent = '데이터 불러오기 실패';
    }
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function appendRankRow(container, rank, username, scoreVal, elapsedSec, maxLevel){
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; flex-direction:column; padding:4px 0;';
    const topLine = document.createElement('div');
    topLine.style.cssText = 'display:flex; justify-content:space-between; width:100%;';
    const left = document.createElement('span');
    left.textContent = rank + '. ' + String(username);
    const right = document.createElement('span');
    const scoreB = document.createElement('b');
    scoreB.textContent = String(scoreVal);
    right.appendChild(scoreB);
    if (elapsedSec !== undefined && elapsedSec !== null) {
      const timeSpan = document.createElement('span');
      timeSpan.className = 'rank-time';
      timeSpan.textContent = ' (' + formatElapsed(elapsedSec) + ')';
      right.appendChild(timeSpan);
    }
    topLine.appendChild(left);
    topLine.appendChild(right);
    row.appendChild(topLine);

    // [신규] 이 판에서 도달한 최고 천체를 이름 아래 작은 글씨로 표시
    if (maxLevel !== undefined && maxLevel !== null && levels[maxLevel]) {
      const sub = document.createElement('div');
      const reachedGalaxy = maxLevel === GALAXY_LEVEL;
      sub.style.cssText = 'font-size:10.5px; color:' + (reachedGalaxy ? '#c084fc' : '#9a90b8') + '; margin-top:1px;';
      sub.textContent = (reachedGalaxy ? '🌌 ' : '최고: ') + levels[maxLevel].name;
      row.appendChild(sub);
    }
    container.appendChild(row);
  }

  document.getElementById('close-rank').addEventListener('click', function(){
    document.getElementById('rank-modal').style.display = 'none';
  });

  document.getElementById('save-restart-btn').addEventListener('click', async function(){
    const raw = document.getElementById('user-name').value || '';
    const name = raw.trim().slice(0, 10) || '익명';

    const elapsedSec = getElapsedSec();
    const plausible = mergeCount >= 0 && score <= (mergeCount + 1) * 150 && elapsedSec > 1;

    if (supabase && plausible) {
      try {
        await supabase.from('planet_scores').insert([{ username: name, score: score, elapsed_sec: elapsedSec, max_level: maxLevelReached }]);
      } catch (e) { console.error('Save Error', e); }
    } else if (supabase && !plausible) {
      console.warn('비정상 점수로 판단되어 저장을 건너뜁니다.');
    }
    location.reload();
  });
})();
</script>
