        html { background: #111; height: 100%; overscroll-behavior: none; }
        body {
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 700px;
            background-color: #2ecc71;
            background-image:
                repeating-linear-gradient(180deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 38px, rgba(255,255,255,0.05) 38px, rgba(255,255,255,0.05) 76px),

                linear-gradient(180deg, transparent calc(100% - 3px), rgba(255,255,255,0.35) calc(100% - 3px));
            overflow: hidden;
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* 햄버거 메뉴 (사이트 공통 패턴) */
        .menu-wrap { position: fixed; top: 10px; right: 10px; z-index: 2000; }
        .hamburger-btn {
            background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.6); border-radius: 20px;
            width: 40px; height: 36px; font-size: 18px; cursor: pointer; backdrop-filter: blur(4px);
            font-family: 'Courier New', Courier, monospace;
        }
        .dropdown-menu {
            display: none; position: absolute; top: 44px; right: 0; background: #161616; border: 1px solid #333;
            border-radius: 12px; overflow: hidden; min-width: 175px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a, .dropdown-menu button {
            display: flex; align-items: center; gap: 8px; width: 100%; padding: 12px 16px; background: none; border: none;
            color: #eee; font-size: 13px; text-align: left; text-decoration: none; cursor: pointer; box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        .dropdown-menu a:hover, .dropdown-menu button:hover { background: rgba(255,255,255,0.08); }
        .dropdown-menu .divider { height: 1px; background: #333; margin: 4px 0; }

        #kakao-browser-notice {
            display:none; position:fixed; top:0; left:0; width:100%; z-index:5000; background:#3c1e1e; color:#fff;

            font-family: sans-serif;

        @media (max-width: 768px) {
            body { height: 100vh; height: 100dvh; background-color: #2ecc71; }
            html { background: #2ecc71; }
            .menu-wrap { top: 10px; }
        }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

        .btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 36px;
            font-size: 20px;
            font-weight: 900;
            background: #ffea00;
            color: #000;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
            z-index: 20;
            border-radius: 8px;

            align-items: center;

        .setupRow {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;

            font-weight: 900;
            background: #8a8a8a;
            color: #fff;
            border: 2px solid #000;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #000;

        .kitSwatchSmall {
            width: 34px;
            height: 34px;
            border: 2px solid #000;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
        }
        .kitSwatchSmall svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .kitSwatchSmall.selected {
            outline: 3px solid #ffea00;
            outline-offset: 2px;
            animation: selectedPulse 1s ease-in-out infinite;
        }
        @keyframes selectedPulse {
            0%, 100% { box-shadow: 2px 2px 0 #000, 0 0 0px rgba(255,234,0,0.8); }
            50% { box-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,234,0,0.9); }
        }
        #startBtnWrap { margin-top: 4px; }

        #defendPicker {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 40;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #defendHeading {
            color: #fff;
            font-weight: 900;
            font-size: 15px;
            text-align: center;
            padding: 0 24px;
            text-shadow: 1px 1px 0 #000;
        }
        #defendGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            width: 280px;
            height: 190px;
        }
        .zoneBtn {
            background: #ffea00;
            border: 4px solid #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            text-align: center;
        }
        .zoneBtn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
    </style>
</head>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const menuBtn = document.getElementById('menuBtn');
    const shareResultBtn = document.getElementById('shareResultBtn');
    const statsLine = document.getElementById('statsLine');
    const actionBtn = document.getElementById('actionBtn');
    const setupScreen = document.getElementById('setupScreen');
    const turnIndicator = document.getElementById('turnIndicator');

    const WIDTH = 400;
    const HEIGHT = 700;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    ctx.imageSmoothingEnabled = false;

    const OFF_WIDTH = WIDTH / PIXEL_SCALE;
    const OFF_HEIGHT = HEIGHT / PIXEL_SCALE;

    offCanvas.height = OFF_HEIGHT;

          shorts: '#0b1f4b', shortsAccent: '#d21034', sock: '#ffffff', sockStripe: '#0b1f4b',
          flagSvg: '<svg viewBox="0 0 24 16" preserveAspectRatio="xMidYMid slice"><rect width="24" height="16" fill="#fff"/><rect y="6" width="24" height="4" fill="#ce1124"/><rect x="10" width="4" height="16" fill="#ce1124"/></svg>' },
        { name: '아르헨티나', code: 'ARG', shirt: '#ffffff', shirt2: '#78c2f0', pattern: 'stripe',
          shorts: '#0b1f4b', sock: '#ffffff', sockStripe: '#d21034',
          flagSvg: '<svg viewBox="0 0 24 16" preserveAspectRatio="xMidYMid slice"><rect width="24" height="16" fill="#75aadb"/><rect y="5.33" width="24" height="5.33" fill="#fff"/><circle cx="12" cy="8" r="2.1" fill="#f6b40e" stroke="#85340a" stroke-width="0.3"/></svg>' },

    // ===== 실제 음원 재생 모듈 (휘슬/킥/함성/탄식/메인화면음악/엔딩환호 - 사용자 제공 mp3) =====
    const realAudio = {};
    let realAudioReady = false;
    function initRealAudio() {
        if (realAudioReady) return;
        realAudioReady = true;
        for (const key in REAL_SFX_B64) {
            const a = new Audio(REAL_SFX_B64[key]);
            a.preload = 'auto';
            realAudio[key] = a;
        }
        realAudio.menuMusic.loop = true;
        realAudio.menuMusic.volume = 0.32;
        realAudio.goalCheer.volume = 0.85;
        realAudio.endingCheer.volume = 0.75;
        realAudio.disappointment.volume = 0.75;
        realAudio.whistle.volume = 0.8;
        realAudio.kick.volume = 0.9;
        realAudio.netHit.volume = 0.65;
    }
    // 짧은 효과음(휘슬/킥/함성/탄식)은 겹쳐 재생될 수 있으므로 매번 복제해서 재생한다
    function playRealOneShot(key, vol) {
        if (!realAudioReady) return;
        const base = realAudio[key];
        if (!base) return;
        try {
            const node = base.cloneNode();
            node.volume = vol != null ? vol : base.volume;
            node.play().catch(() => {});
        } catch (e) {}
    }
    function playMenuMusic() {
        if (!realAudioReady) return;
        try { realAudio.menuMusic.currentTime = 0; realAudio.menuMusic.play().catch(() => {}); } catch (e) {}
    }
    function pauseMenuMusic() {
        if (!realAudioReady) return;
        try { realAudio.menuMusic.pause(); } catch (e) {}
    }
    function playEndingCheer() {
        if (!realAudioReady) return;
        try { realAudio.endingCheer.currentTime = 0; realAudio.endingCheer.play().catch(() => {}); } catch (e) {}
    }
    function stopEndingCheer() {
        if (!realAudioReady) return;
        try { realAudio.endingCheer.pause(); realAudio.endingCheer.currentTime = 0; } catch (e) {}
    }
    // 설정 화면에서 첫 터치/클릭이 발생하는 순간 오디오를 언락하고 메인화면 음악을 재생
    function unlockAudioAndStartMenuMusic() {
        initAudio();
        initRealAudio();
        playMenuMusic();
    }
    document.addEventListener('pointerdown', unlockAudioAndStartMenuMusic, { once: true });

    // ===== 사운드 엔진 (외부 파일 없이 Web Audio API로 직접 합성) =====
    let audioCtx = null;
    let audioUnlocked = false;
    function initAudio() {
        if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioUnlocked = true;
        } catch (e) { audioUnlocked = false; }
    }
    function now() { return audioCtx ? audioCtx.currentTime : 0; }
    function playTone(freq, dur, type, vol, freqEnd, delay) {
        if (!audioCtx) return;
        const t0 = now() + (delay || 0);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, t0);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.001, vol || 0.2), t0 + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t0); osc.stop(t0 + dur + 0.02);
    }
    function playNoise(dur, vol, filterFreq, delay) {
        if (!audioCtx) return;
        const t0 = now() + (delay || 0);
        const bufferSize = Math.floor(audioCtx.sampleRate * dur);
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource(); src.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = filterFreq || 1000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.001, vol || 0.15), t0 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        src.start(t0); src.stop(t0 + dur + 0.02);
    }
    // 노이즈 버스트를 더 세밀하게 제어(필터 종류/Q, 어택-피크-릴리즈 시점을 각각 지정)하기 위한 저수준 헬퍼
    function playNoiseCustom(opts) {
        if (!audioCtx) return;
        const t0 = now() + (opts.delay || 0);
        const dur = opts.dur;
        const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        const fadeIn = opts.ampEnvelope === 'fadeIn';
        for (let i = 0; i < bufferSize; i++) {
            const raw = Math.random() * 2 - 1;
            data[i] = fadeIn ? raw * (i / bufferSize) : raw * (1 - i / bufferSize);
        }
        const src = audioCtx.createBufferSource(); src.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = opts.filterType || 'bandpass';
        filter.frequency.value = opts.freq || 1000;
        filter.Q.value = opts.q != null ? opts.q : 1;
        const gain = audioCtx.createGain();
        const peak = Math.max(0.001, opts.vol || 0.15);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(peak, t0 + (opts.attack || 0.015));
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        src.start(t0); src.stop(t0 + dur + 0.02);
    }
    function sfxClick() { playTone(700, 0.05, 'square', 0.06); }
    function sfxWhistle() { playTone(2200, 0.35, 'sine', 0.12, 2600); }
    // 발이 공에 닿는 '퍽' 임팩트(저음 바디) + 가죽공 특유의 탄성 '텅'(중음) + 신발-공 마찰 '착'(고음 노이즈)을 겹쳐서
    // 전자음이 아니라 실제 타격감이 느껴지는 킥 사운드를 만든다
    function sfxKick() {
        if (!audioCtx) return;
        const t0 = now();
        // 저음 임팩트
        const thump = audioCtx.createOscillator();
        const thumpGain = audioCtx.createGain();
        thump.type = 'sine';
        thump.frequency.setValueAtTime(155, t0);
        thump.frequency.exponentialRampToValueAtTime(42, t0 + 0.1);
        thumpGain.gain.setValueAtTime(0.0001, t0);
        thumpGain.gain.exponentialRampToValueAtTime(0.38, t0 + 0.007);
        thumpGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.13);
        thump.connect(thumpGain); thumpGain.connect(audioCtx.destination);
        thump.start(t0); thump.stop(t0 + 0.15);
        // 중음 바디(가죽 탄성감)
        const body = audioCtx.createOscillator();
        const bodyGain = audioCtx.createGain();
        body.type = 'triangle';
        body.frequency.setValueAtTime(300, t0);
        body.frequency.exponentialRampToValueAtTime(170, t0 + 0.045);
        bodyGain.gain.setValueAtTime(0.0001, t0);
        bodyGain.gain.exponentialRampToValueAtTime(0.16, t0 + 0.005);
        bodyGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
        body.connect(bodyGain); bodyGain.connect(audioCtx.destination);
        body.start(t0); body.stop(t0 + 0.08);
        // 고음 마찰 노이즈
        playNoiseCustom({ dur: 0.045, vol: 0.24, filterType: 'highpass', freq: 2400, q: 0.7, attack: 0.004 });
    }
    function sfxClang() { playTone(1100, 0.35, 'triangle', 0.22, 300); playNoise(0.25, 0.12, 2500); }
    function sfxNetRipple() { playNoise(0.3, 0.08, 3200); }
    // 여러 주파수 대역의 필터링된 노이즈를 겹쳐 '다수의 함성'처럼 만들고,
    // 그 위에 랜덤 타이밍의 짧은 '와!' 외침을 얹어서 실제 관중 함성에 가깝게 합성한다
    function sfxCheer() {
        if (!audioCtx) return;
        const dur = 1.3;
        const bands = [450, 750, 1100, 1600, 2300];
        bands.forEach((freq, i) => {
            playNoiseCustom({
                dur: dur - i * 0.05, vol: Math.max(0.02, 0.1 - i * 0.014),
                filterType: 'bandpass', freq: freq, q: 0.7,
                attack: 0.18 + i * 0.03, delay: i * 0.02, ampEnvelope: 'fadeIn'
            });
        });
        for (let k = 0; k < 7; k++) {
            const delay = Math.random() * 0.55;
            const freq = 320 + Math.random() * 480;
            playTone(freq, 0.28 + Math.random() * 0.22, 'sawtooth', 0.035, freq * 1.35, delay);
        }
    }
    // 낮은 대역 노이즈를 겹쳐 '아쉬워하는 다수의 탄식'을 만들고, 아래로 처지는 톤을 얹어 실망감을 표현한다
    function sfxGroan() {
        if (!audioCtx) return;
        const dur = 0.9;
        const bands = [300, 220, 160];
        bands.forEach((freq, i) => {
            playNoiseCustom({
                dur: dur - i * 0.06, vol: Math.max(0.02, 0.14 - i * 0.02),
                filterType: 'bandpass', freq: freq, q: 0.9,
                attack: 0.03 + i * 0.02, delay: i * 0.015
            });
        });
        playTone(260, 0.55, 'sawtooth', 0.07, 95);
        for (let k = 0; k < 3; k++) {
            const delay = Math.random() * 0.2;
            const freq = 180 + Math.random() * 160;
            playTone(freq, 0.4, 'sawtooth', 0.03, freq * 0.5, delay);
        }

    // 폭죽이 터지는 순간의 '팡' 소리 (경기 종료 후 세리머니 화면에서 폭죽마다 재생)
    function sfxFireworkPop() {

    function sfxCountBeep(urgent) { playTone(urgent ? 1000 : 700, 0.08, 'square', 0.07); }
    function vibrate(pattern) {

    // ===== 로컬 전적/연승 기록 =====
    const STATS_KEY = 'pk_shootout_stats_v1';
    function loadStats() {

    let playerStats = loadStats();
    let justHitNewBestStreak = false;
    updateStatsLine();

    let gameMode = '1P';       // '1P' | '2P'
    let difficulty = 'NORMAL'; // 'EASY' | 'NORMAL' | 'HARD'
    let p1Kit = JERSEYS[0];
    let p2Kit = JERSEYS[1];

    // ===== 설정 화면 UI 빌드 =====

    [['1P', '1인 플레이'], ['2P', '2인 플레이']].forEach(([val, label]) => {

    [['EASY', '쉬움'], ['NORMAL', '보통'], ['HARD', '어려움']].forEach(([val, label]) => {
        const b = document.createElement('div');
        b.className = 'smallBtn' + (val === difficulty ? ' selected' : '');

        b.onclick = () => {

    buildKitRow(p1KitRow, 1);
    buildKitRow(p2KitRow, 2);
    // 기본값: P2는 두 번째 유니폼으로 시작 (P1과 겹치지 않게)
    p2KitRow.children[1].classList.add('selected');
    p2KitRow.children[0].classList.remove('selected');
    p2Kit = JERSEYS[1];

    // ===== 게임 상태 =====
    let gameState = 'START_SCREEN';
    let maxAttempts = 5;
    let matchDecided = false;
    let winner = null; // 1 또는 2
    let opponentKit = null; // 1P 모드에서 랜덤으로 정해지는 상대 국가

    // 두 팀(플레이어/상대) 스코어
    let score1 = 0, score2 = 0;
    let shotResults1 = [], shotResults2 = [];
    let currentKicker = 1; // 1 또는 2 (번갈아 사용)
    let kicksTaken1 = 0, kicksTaken2 = 0;

    let resultText = '';
    let resultTimer = 0;
    let confetti = [];
    let fireworks = [];
    let fireworkSpawnTimer = 0;
    let celebrationPlayers = [];
    let loserPlayers = [];
    let celebrationActive = false;
    let gameFrame = 0;

    const goal = { x: 40, y: 130, width: 320, height: 135 };
    const ballStart = { x: WIDTH / 2, y: 530 };
    const playerStart = { x: 130, y: 550 };

    let ball = { x: ballStart.x, y: ballStart.y, radius: 10, targetX: 0, targetY: 0, rotation: 0 };
    let targetCursor = { x: WIDTH / 2, y: goal.y + goal.height / 2, dirX: 1, dirY: 1, speed: 6, radius: 15 };
    let powerBar = { value: 0, dir: 1, speed: 3.5, locked: false, power: '', timeLimit: 300, startFrame: 0 };
    let lastBeepSecond = -1;
    let keeper = { x: WIDTH / 2, y: 254, targetX: WIDTH / 2, targetY: 254, state: 'IDLE' };
    let player = { x: playerStart.x, y: playerStart.y, state: 'IDLE' };
    let opponentPrepTimer = 0;
    let roundShirtNumber = 7;
    let opponentKickTriggered = false;
    let pendingShot = null;
    let tellActive = false;
    let tellDir = 0;
    let tellAngle = 0;
    let tellDuration = 0;
    let tellWindowStart = 30;

    // 골대/크로스바를 맞고 튕겨나가는 '아쉬운 미스' 연출용 상태
    let pendingBounce = null;
    let screenShakeFrames = 0;
    let screenShakeMag = 0;

    // 결정적인 라운드(서든데스 / 매치포인트)에서 슬로우모션을 적용하기 위한 플래그
    let isTenseRound = false;

    const ZONE_LABELS = ['왼쪽 위', '가운데 위', '오른쪽 위', '왼쪽 아래', '가운데 아래', '오른쪽 아래'];

    function getZone(x, y) {
        const col = x < goal.x + goal.width / 3 ? 0 : (x < goal.x + goal.width * 2 / 3 ? 1 : 2);
        const row = y < goal.y + goal.height / 2 ? 0 : 1;
        return row * 3 + col;
    }
    function zoneCenter(z) {
        const col = z % 3, row = Math.floor(z / 3);
        return {
            x: goal.x + (col + 0.5) * (goal.width / 3),
            y: goal.y + (row + 0.5) * (goal.height / 2)
        };
    }
    function aiGuessChance() {
        if (difficulty === 'EASY') return 0.08;
        if (difficulty === 'HARD') return 0.42;
        return 0.20;
    }

    // WEAK/OVERPOWER 미스일 때, 40% 확률로 그냥 크게 빗나가는 대신
    // 포스트/크로스바를 맞고 튕겨나가는 극적인 '아쉬운 미스'를 만든다.
    function computeMissShot(quality, aimedX) {
        const wantsBounce = Math.random() < 0.4;
        let targetX, targetY, bounce = null;
        if (quality === 'OVERPOWER') {
            if (wantsBounce) {
                targetX = Math.max(goal.x + 15, Math.min(goal.x + goal.width - 15, aimedX));
                targetY = goal.y - 1;
                const dir = Math.random() > 0.5 ? 1 : -1;
                bounce = { type: 'BAR', afterX: targetX + dir * (40 + Math.random() * 50), afterY: targetY - (55 + Math.random() * 40) };
            } else {
                targetY = goal.y - (55 + Math.random() * 45);
                targetX = Math.max(goal.x - 45, Math.min(goal.x + goal.width + 45,
                    aimedX + (Math.random() > 0.5 ? 1 : -1) * (30 + Math.random() * 50)));
            }
        } else { // WEAK
            const leftSide = Math.random() > 0.5;
            if (wantsBounce) {
                targetX = leftSide ? goal.x + 1 : goal.x + goal.width - 1;
                targetY = goal.y + goal.height * (0.28 + Math.random() * 0.3);
                const dir = leftSide ? -1 : 1;
                bounce = { type: 'POST', afterX: targetX + dir * (45 + Math.random() * 45), afterY: targetY + (10 + Math.random() * 25) };
            } else {
                targetX = leftSide ? goal.x - (35 + Math.random() * 35) : goal.x + goal.width + (35 + Math.random() * 35);
                targetY = goal.y + goal.height * 0.55;
            }
        }
        return { targetX, targetY, bounce };
    }

    // 등번호: 1~3번째 키커는 7·10·11 중 랜덤, 4~10번째는 1번을 제외한 랜덤,
    // 11번째부터는 골키퍼(1번)가 직접 키커로 나선다는 설정
    function pickShirtNumber(idx) {

    const defendPicker = document.getElementById('defendPicker');

    function openDefendPicker() {

    function startGame() {

    canvas.addEventListener('mousedown', handleAction);
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); handleAction(e); }, {passive: false});

    });

    function handleAction(e) {
        if (gameState === 'AIM_Y') {
            sfxClick();

            sfxClick();
            ball.targetX = targetCursor.x;
            ball.targetY = targetCursor.y;

            powerBar.locked = true;

    // 플레이어가 최근 어느 코너를 즐겨 쏘는지 추적 (1P 모드 AI 수비 적응형 힌트용)
    let playerZoneHistory = [0, 0, 0, 0, 0, 0];

    function aiPickZone(trueZone) {
        const baseChance = aiGuessChance();

        // 난이도별 '패턴 읽기' 반영 강도: 쉬움은 전혀 안 읽고, 어려움은 강하게 읽는다
        const adaptBonus = difficulty === 'HARD' ? 0.32 : (difficulty === 'NORMAL' ? 0.14 : 0);

        if (adaptBonus > 0) {
            const total = playerZoneHistory.reduce((a, b) => a + b, 0);
            if (total >= 3) {
                let favZone = 0, favCount = -1;
                for (let i = 0; i < 6; i++) { if (playerZoneHistory[i] > favCount) { favCount = playerZoneHistory[i]; favZone = i; } }
                const favRatio = favCount / total;
                if (favZone === trueZone && favRatio > 0.3) {
                    const chance = Math.min(0.88, baseChance + adaptBonus * favRatio);
                    if (Math.random() < chance) return trueZone;
                    let z2; do { z2 = Math.floor(Math.random() * 6); } while (z2 === trueZone);
                    return z2;
                }
            }
        }

        if (Math.random() < baseChance) return trueZone;
        let z;
        do { z = Math.floor(Math.random() * 6); } while (z === trueZone);
        return z;
    }

    let kickZone = 0;
    let defendTimer = 0;

    function recordResult(outcome) {
        const isPlayerShot = (currentKicker === 1);

        if (outcome === 'GOAL') {
            resultText = 'GOAL!';
            createConfetti();
            playRealOneShot('netHit', 0.65);
            playRealOneShot('goalCheer', 0.85);
            vibrate([90, 40, 90]);
        } else if (outcome === 'SAVED') {
            resultText = 'SAVED!';
            playRealOneShot('disappointment', 0.75);
            vibrate(70);
        } else {
            if (pendingBounce && pendingBounce.type === 'BAR') resultText = 'CROSSBAR!';
            else if (pendingBounce && pendingBounce.type === 'POST') resultText = 'POST!';
            else resultText = 'MISS...';
            playRealOneShot('disappointment', 0.75);
            vibrate(pendingBounce ? [40, 30, 60] : 50);
        }
        pendingBounce = null;

        if (isPlayerShot) {
            playerStats.shotsTaken++;
            if (outcome === 'GOAL') playerStats.shotsScored++;
            saveStats();
        }

        if (currentKicker === 1) {
            shotResults1.push(outcome);
            if (outcome === 'GOAL') score1++;
            kicksTaken1++;
        } else {
            shotResults2.push(outcome);
            if (outcome === 'GOAL') score2++;
            kicksTaken2++;
        }
        checkDecision();
        gameState = 'RESULT';
        resultTimer = isTenseRound ? 105 : 80;
    }

    // 승부 판정: 정규 라운드 중 조기 승부 확정 + 동점 시 서든데스(연장) 자동 연장
    function checkDecision() {
        if (matchDecided) return;
        const remainingA = maxAttempts - kicksTaken1;
        const remainingB = maxAttempts - kicksTaken2;
        if (score1 > score2 + remainingB) { matchDecided = true; winner = 1; return; }
        if (score2 > score1 + remainingA) { matchDecided = true; winner = 2; return; }
        if (kicksTaken1 >= maxAttempts && kicksTaken2 >= maxAttempts) {
            if (score1 !== score2) { matchDecided = true; winner = score1 > score2 ? 1 : 2; }
            else { maxAttempts++; } // 동점 -> 서든데스 한 라운드씩 연장
        }
    }

    // 이번 라운드의 결과(GOAL이든 MISS/SAVED든)가 경기를 바로 끝낼 수 있는지 미리 계산
    // -> 서든데스이거나 매치포인트 상황이면 '긴장되는 라운드'로 표시해서 슬로우모션 등 연출에 사용
    function computeTenseRound() {
        if (maxAttempts > 5) return true; // 서든데스는 항상 긴장 상태
        const remainingA = maxAttempts - kicksTaken1;
        const remainingB = maxAttempts - kicksTaken2;
        // 이번 슈팅이 골이든 미스든, 그 결과로 경기가 끝날 수 있는지 시뮬레이션
        const scoreIfGoal1 = score1 + (currentKicker === 1 ? 1 : 0);
        const scoreIfGoal2 = score2 + (currentKicker === 2 ? 1 : 0);
        const remAfterA = remainingA - (currentKicker === 1 ? 1 : 0);
        const remAfterB = remainingB - (currentKicker === 2 ? 1 : 0);
        const decidesIfGoal = (scoreIfGoal1 > score2 + remAfterB) || (scoreIfGoal2 > score1 + remAfterA);
        const decidesIfMiss = (score1 > score2 + remAfterB) || (score2 > score1 + remAfterA);
        return decidesIfGoal || decidesIfMiss;
    }

    function evaluateShot() {
        const perfect = powerBar.power === 'PERFECT';
        playRealOneShot('kick', 0.9); vibrate(15);

        if (!perfect) {
            // 초록존(PERFECT)이 아니면 골대를 벗어남 - 수비 판정 없이 즉시 미스 (또는 포스트/바 직격)
            const miss = computeMissShot(powerBar.power, ball.targetX);
            ball.targetX = miss.targetX; ball.targetY = miss.targetY;
            pendingBounce = miss.bounce;
            keeper.state = 'IDLE';
            gameState = 'KICKED';
            setTimeout(() => recordResult('MISS'), miss.bounce ? 750 : 420);
            return;
        }

        kickZone = getZone(ball.targetX, ball.targetY);
        if (gameMode === '1P' && currentKicker === 1) playerZoneHistory[kickZone]++;
        keeper.state = 'READY';
        gameState = 'DEFEND_PICK';

        if (gameMode === '1P') {
            defendTimer = 45;
        } else {
            openDefendPicker();
        }
    }

    // ===== 1P 모드: 상대팀(AI)의 자동 슈팅 =====
    // 상대팀 슈팅을 미리 '결정'만 해두고(아직 공은 안참), 러닝 도중 살짝 텔(자세 힌트)을 보여준다.
    // 난이도가 높을수록 텔이 더 짧고 미묘해져서, 순수 운이 아니라 관찰력/반응속도가 중요해진다.
    function decideOpponentShot() {
        const chances = {
            EASY:   { PERFECT: 0.45, WEAK: 0.35, OVERPOWER: 0.20 },
            NORMAL: { PERFECT: 0.65, WEAK: 0.20, OVERPOWER: 0.15 },
            HARD:   { PERFECT: 0.82, WEAK: 0.08, OVERPOWER: 0.10 }
        };
        const c = chances[difficulty] || chances.NORMAL;
        const r = Math.random();
        let quality;
        if (r < c.PERFECT) quality = 'PERFECT';
        else if (r < c.PERFECT + c.WEAK) quality = 'WEAK';
        else quality = 'OVERPOWER';

        const tz = Math.floor(Math.random() * 6);
        const zc = zoneCenter(tz);
        let targetX = zc.x + (Math.random() * 30 - 15);
        let targetY = zc.y + (Math.random() * 20 - 10);
        let bounce = null;

        if (quality !== 'PERFECT') {
            const miss = computeMissShot(quality, targetX);
            targetX = miss.targetX; targetY = miss.targetY; bounce = miss.bounce;
        }

        pendingShot = { quality, targetX, targetY, tz, bounce };

        // 텔(눈치) 방향/강도 설정 - PERFECT 슈팅일 때만 의미 있는 힌트를 준다
        const tellParams = {
            EASY:   { dur: 30, angle: 0.32 },
            NORMAL: { dur: 16, angle: 0.20 },
            HARD:   { dur: 7,  angle: 0.11 }
        };
        const tp = tellParams[difficulty] || tellParams.NORMAL;
        tellDuration = tp.dur;
        tellAngle = tp.angle;
        if (quality === 'PERFECT') {
            const col = tz % 3; // 0=왼쪽, 1=가운데, 2=오른쪽
            tellDir = col === 0 ? -1 : (col === 2 ? 1 : 0);
        } else {
            tellDir = 0;
        }
        tellActive = false;
    }

    function executeOpponentShot() {
        const s = pendingShot;
        tellActive = false;
        if (!s) return;
        powerBar.power = s.quality;
        ball.targetX = s.targetX;
        ball.targetY = s.targetY;
        playRealOneShot('kick', 0.9); vibrate(15);

        if (s.quality !== 'PERFECT') {
            pendingBounce = s.bounce;
            keeper.state = 'IDLE';
            gameState = 'KICKED';
            setTimeout(() => recordResult('MISS'), s.bounce ? 750 : 420);
            return;
        }

        kickZone = s.tz;
        keeper.state = 'READY';
        gameState = 'DEFEND_PICK';
        openDefendPicker();
    }

    function resolveDefend(zone) {
        closeDefendPicker();
        const c = zoneCenter(zone);
        keeper.diveDir = c.x >= keeper.x ? 1 : (c.x < keeper.x ? -1 : (Math.random() < 0.5 ? -1 : 1));
        keeper.diveElapsed = 0;
        keeper.state = 'DIVING';
        keeper.targetX = c.x;
        keeper.targetY = c.y - 10;
        gameState = 'KICKED';
        setTimeout(() => recordResult(zone === kickZone ? 'SAVED' : 'GOAL'), 380);
    }

    function createConfetti() {
        for (let i = 0; i < 60; i++) {
            confetti.push({
                x: goal.x + Math.random() * goal.width, y: goal.y + Math.random() * 50,

    function drawFireworks(ctx) {
        fireworkSpawnTimer--;
        if (fireworkSpawnTimer <= 0) { spawnFirework(); fireworkSpawnTimer = 35 + Math.floor(Math.random() * 25); }
        for (const p of fireworks) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life--;

    function applyMiniPattern(ctx, kit, torso) {
        // torso: {top, bottom, halfTop, halfBottom} local torso geometry for mini sprites
        if (!kit.pattern || !kit.shirt2) return;
        if (kit.pattern === 'diagonal') {
            ctx.fillStyle = kit.shirt2;
            ctx.beginPath();
            ctx.moveTo(torso.halfTop, torso.top); ctx.lineTo(torso.halfBottom, torso.bottom); ctx.lineTo(-torso.halfBottom, torso.bottom);
            ctx.closePath(); ctx.fill();
        } else if (kit.pattern === 'stripe') {
            ctx.fillStyle = kit.shirt2;
            for (let sx = -torso.halfTop + 1; sx < torso.halfTop; sx += 4) {
                ctx.fillRect(sx, torso.top, 2, torso.bottom - torso.top);
            }
        } else if (kit.pattern === 'sleeve') {
            ctx.fillStyle = kit.shirt2;
            ctx.beginPath();
            ctx.moveTo(-torso.halfTop, torso.top); ctx.lineTo(-torso.halfTop + 6, torso.top);
            ctx.lineTo(-torso.halfTop + 3, torso.top + 5); ctx.lineTo(-torso.halfTop, torso.top + 4);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(torso.halfTop, torso.top); ctx.lineTo(torso.halfTop - 6, torso.top);
            ctx.lineTo(torso.halfTop - 3, torso.top + 5); ctx.lineTo(torso.halfTop, torso.top + 4);
            ctx.closePath(); ctx.fill();
        } else if (kit.pattern === 'tiger') {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(-torso.halfTop, torso.top); ctx.lineTo(torso.halfTop, torso.top);
            ctx.lineTo(torso.halfBottom, torso.bottom); ctx.lineTo(-torso.halfBottom, torso.bottom);
            ctx.closePath(); ctx.clip();
            ctx.fillStyle = kit.shirt2; ctx.globalAlpha = 0.75;
            ctx.save(); ctx.translate(-torso.halfTop, torso.top + 3); ctx.rotate(-0.3); ctx.fillRect(0, 0, 8, 1.6); ctx.restore();
            ctx.save(); ctx.translate(-4, torso.top + 9); ctx.rotate(0.25); ctx.fillRect(0, 0, 10, 1.6); ctx.restore();
            ctx.save(); ctx.translate(-6, torso.top + 15); ctx.rotate(-0.2); ctx.fillRect(0, 0, 9, 1.6); ctx.restore();
            ctx.globalAlpha = 1;
            ctx.restore();
        }
    }

    function drawMiniPlayer(ctx, x, y, kit, waveFlag) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 12, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = kit.shorts; ctx.fillRect(-6, -4, 12, 10);
        if (kit.shortsAccent) { ctx.fillStyle = kit.shortsAccent; ctx.fillRect(-6, -4, 12, 2); }
        ctx.fillStyle = kit.sock; ctx.fillRect(-6, 6, 5, 8); ctx.fillRect(1, 6, 5, 8);
        ctx.fillStyle = kit.shirt;
        ctx.beginPath(); ctx.moveTo(-9, -24); ctx.lineTo(9, -24); ctx.lineTo(7, -4); ctx.lineTo(-7, -4); ctx.fill();
        applyMiniPattern(ctx, kit, { top: -24, bottom: -4, halfTop: 9, halfBottom: 7 });
        if (kit.collar) {
            ctx.fillStyle = kit.collar;
            ctx.beginPath();
            ctx.moveTo(-3.5, -24); ctx.lineTo(3.5, -24); ctx.lineTo(2, -21); ctx.lineTo(0, -19); ctx.lineTo(-2, -21);
            ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(0, -29, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = (kit.pattern === 'sleeve' && kit.shirt2) ? kit.shirt2 : kit.shirt;
        ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-14, -34); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8, -22); ctx.lineTo(14, -34); ctx.stroke();
        if (waveFlag) {
            ctx.strokeStyle = '#7a5230'; ctx.lineWidth = 1.4;
            ctx.beginPath(); ctx.moveTo(14, -34); ctx.lineTo(21, -45); ctx.stroke();
            drawFlagIcon(ctx, kit, 20, -49, 11, 8);
        }
        ctx.restore();
    }

    function drawSadPlayer(ctx, x, y, kit, role, settle) {
        ctx.save(); ctx.translate(x, y); ctx.globalAlpha = settle;
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 10, 9, 3, 0, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = kit.shorts; ctx.fillRect(-6, -6, 12, 8);
        if (kit.shortsAccent) { ctx.fillStyle = kit.shortsAccent; ctx.fillRect(-6, -6, 12, 2); }
        ctx.fillStyle = kit.sock; ctx.fillRect(-7, 2, 6, 7); ctx.fillRect(1, 2, 6, 7);

        ctx.save();
        ctx.rotate(role === 'comfort' ? 0.05 : 0.2);
        ctx.fillStyle = kit.shirt;
        ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(8, -22); ctx.lineTo(6, -4); ctx.lineTo(-6, -4); ctx.fill();
        applyMiniPattern(ctx, kit, { top: -22, bottom: -4, halfTop: 8, halfBottom: 6 });
        ctx.restore();

        ctx.fillStyle = '#ffccaa';
        ctx.beginPath(); ctx.arc(role !== 'comfort' ? 3 : 0, role !== 'comfort' ? -16 : -22, 5, 0, Math.PI * 2); ctx.fill();

        if (role !== 'comfort') {
            ctx.fillStyle = kit.shirt;
            ctx.beginPath(); ctx.arc(0, -14, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, -14, 3, 0, Math.PI * 2); ctx.fill();
            if (Math.sin(gameFrame * 0.1 + x) > 0.3) {
                ctx.fillStyle = '#7ec8ff';
                ctx.beginPath(); ctx.arc(role === 'sad' ? 8 : -1, -10, 1.6, 0, Math.PI * 2); ctx.fill();
            }
        } else {
            ctx.strokeStyle = (kit.pattern === 'sleeve' && kit.shirt2) ? kit.shirt2 : kit.shirt;
            ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(6, -18); ctx.lineTo(18, -16); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-6, -18); ctx.lineTo(-18, -14); ctx.stroke();
        }
        ctx.restore();
    }

    function updateAndDrawCelebration(ctx) {
        for (const p of celebrationPlayers) {
            if (p.phase === 'RUN') {
                const dx = p.targetX - p.x, dy = p.targetY - p.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 6) { p.phase = 'CHEER'; }
                else { p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed; }
            }
            const bob = p.phase === 'CHEER' ? Math.abs(Math.sin(gameFrame * 0.25 + p.bobOffset)) * 10 : Math.sin(gameFrame * 0.5 + p.bobOffset) * 3;
            drawMiniPlayer(ctx, p.x, p.y - bob, p.kit, p.waveFlag);
        }
    }

    function updateAndDrawLosers(ctx) {
        for (const p of loserPlayers) {
            p.settle = Math.min(1, p.settle + 0.035);
            drawSadPlayer(ctx, p.x, p.y - (1 - p.settle) * 20, p.kit, p.role, p.settle);
        }
    }

    function enterGameOver() {
        gameState = 'GAMEOVER';
        restartBtn.style.display = 'block';
        menuBtn.style.display = 'block';
        actionBtn.style.display = 'none';
        turnIndicator.style.display = 'none';
        celebrationPlayers = [];
        loserPlayers = [];
        fireworks = [];
        celebrationActive = true;
        const loser = winner === 1 ? 2 : 1;
        createConfetti();
        spawnCelebrationPlayers(winner);
        spawnLoserPlayers(loser);
        fireworkSpawnTimer = 20;
        pauseMenuMusic();
        playEndingCheer();

        justHitNewBestStreak = false;
        if (gameMode === '1P') {
            playerStats.gamesPlayed++;
            if (winner === 1) {
                playerStats.gamesWon++;
                playerStats.streak++;
                if (playerStats.streak > playerStats.bestStreak) {
                    playerStats.bestStreak = playerStats.streak;
                    justHitNewBestStreak = playerStats.streak >= 2;
                }
            } else {
                playerStats.streak = 0;
            }
            saveStats();
            if (justHitNewBestStreak) {
                setTimeout(() => { playTone(880, 0.15, 'square', 0.1, 1320); }, 300);
                setTimeout(() => { playTone(1320, 0.2, 'square', 0.1); }, 470);
            }
        }

        shareResultBtn.style.display = 'block';
    }

    // ===== 결과 공유 (결과 카드 이미지 생성 + Web Share API, 카카오 폴백) =====

        const cardCanvas = document.createElement('canvas');
        cardCanvas.width = 600; cardCanvas.height = 600;
        const c = cardCanvas.getContext('2d');

        const grad = c.createLinearGradient(0, 0, 0, 600);
        grad.addColorStop(0, '#245c37'); grad.addColorStop(1, '#0d2015');
        c.fillStyle = grad; c.fillRect(0, 0, 600, 600);

        c.textAlign = 'center';
        c.fillStyle = '#ffea00'; c.font = 'bold 24px "Courier New"';
        c.fillText('⚽ PENALTY SHOOTOUT', 300, 62);
        c.font = 'bold 13px "Courier New"'; c.fillStyle = '#fff';
        c.fillText('WINNER TAKES ALL', 300, 86);

        const leftKit = p1Kit;
        const rightKit = gameMode === '1P' ? opponentKit : p2Kit;
        const isWin = gameMode === '1P' ? (winner === 1) : true;

        drawFlagIcon(c, leftKit, 85, 160, 110, 74);
        drawFlagIcon(c, rightKit, 405, 160, 110, 74);
        c.strokeStyle = 'rgba(255,255,255,0.5)'; c.lineWidth = 2;
        c.strokeRect(85, 160, 110, 74); c.strokeRect(405, 160, 110, 74);
        c.font = 'bold 22px "Courier New"'; c.fillStyle = '#fff';
        c.fillText('VS', 300, 205);

        c.font = 'bold 92px "Courier New"'; c.fillStyle = '#ffea00';
        c.fillText(`${score1} : ${score2}`, 300, 340);

        if (gameMode === '1P') {
            c.font = 'bold 48px "Courier New"';
            c.fillStyle = isWin ? '#3498db' : '#e74c3c';
            c.fillText(isWin ? 'WIN!' : 'LOSE...', 300, 412);
        } else {
            const winKit = winner === 1 ? p1Kit : p2Kit;
            c.font = 'bold 28px "Courier New"'; c.fillStyle = '#3498db';
            c.fillText(`${winKit.name} (P${winner}) WIN!`, 300, 412);
        }

        if (gameMode === '1P' && playerStats.streak >= 2) {
            c.font = 'bold 18px "Courier New"'; c.fillStyle = '#ff6b6b';
            c.fillText(`🔥 ${playerStats.streak}연승 중!`, 300, 452);
        }

        c.font = 'bold 13px "Courier New"'; c.fillStyle = '#9fcbb0';
        c.fillText('spacewarp.co.kr', 300, 565);

        cardCanvas.toBlob(callback, 'image/png');
    }

    function resetRound() {
        ball.x = ballStart.x; ball.y = ballStart.y; ball.rotation = 0; ball.radius = 10;
        player.state = 'IDLE'; player.x = playerStart.x; player.y = playerStart.y;
        keeper.x = WIDTH / 2; keeper.y = 254; keeper.targetX = WIDTH / 2; keeper.targetY = 254; keeper.state = 'IDLE';

        if (matchDecided) {
            enterGameOver();
            return;
        }

        playRealOneShot('whistle', 0.8);

        let roundCount = Math.max(kicksTaken1, kicksTaken2);
        const rampRound = Math.min(roundCount, 4); // 5번째 키커(index 4) 속도에서 상승 멈춤, 이후 동일 유지
        const cursorBase = { EASY: 4.2, NORMAL: 6, HARD: 8 };
        const cursorStep = { EASY: 0.5, NORMAL: 0.8, HARD: 1.0 };
        const powerBase = { EASY: 2.2, NORMAL: 3.5, HARD: 4.6 };
        const powerStep = { EASY: 0.3, NORMAL: 0.5, HARD: 0.6 };
        targetCursor.speed = cursorBase[difficulty] + rampRound * cursorStep[difficulty];
        powerBar.speed = powerBase[difficulty] + rampRound * powerStep[difficulty];
        targetCursor.x = WIDTH / 2;
        targetCursor.y = goal.y + goal.height / 2;
        // 매 라운드 방향을 무작위로 재설정 -> 조준 패턴 고정으로 인한 슈팅 방향 쏠림(및 그 결과 키퍼 쏠림) 방지
        targetCursor.dirX = Math.random() < 0.5 ? 1 : -1;
        targetCursor.dirY = Math.random() < 0.5 ? 1 : -1;
        powerBar.power = ''; powerBar.locked = false; powerBar.value = 0;

        actionBtn.innerText = "SHOOT! (SPACE)";

        // 번갈아 차기: 두 팀 모두 이번 라운드 몫을 안 찼으면 교대
        if (kicksTaken1 <= kicksTaken2 && kicksTaken1 < maxAttempts) currentKicker = 1;
        else if (kicksTaken2 < maxAttempts) currentKicker = 2;

        isTenseRound = computeTenseRound();
        roundShirtNumber = pickShirtNumber(currentKicker === 1 ? kicksTaken1 : kicksTaken2);

        updateTurnIndicator();

        if (gameMode === '1P' && currentKicker === 2) {
            gameState = 'OPP_PREP';
            opponentPrepTimer = 55;
            opponentKickTriggered = false;
            tellActive = false;
            decideOpponentShot();
            actionBtn.style.display = 'none';
        } else {
            gameState = 'AIM_Y';
            tellActive = false; tellDir = 0; pendingShot = null;
            actionBtn.style.display = 'block';
        }
    }
